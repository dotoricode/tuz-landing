<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tuz 재고">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#A82A1F">
  <link rel="apple-touch-icon" href="assets/tuz-inven-icon-180.png">
  <link rel="icon" type="image/png" sizes="64x64" href="assets/tuz-inven-icon-64.png">
  <link rel="icon" type="image/png" href="assets/tuz-inven-icon.png">
  <title>Tuz 재고 관리</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Puradak';
      src: url('fonts/Puradak.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --red:      #A82A1F;
      --red-deep: #7A1B12;
      --red-soft: #F2D9D5;
      --red-tint: #FBEFEC;
      --cream:    #FBF5EA;
      --bone:     #F2EDE5;
      --ink:      #1a1714;
      --g1:       #6b645c;
      --g2:       #a89e8e;
      --g3:       #d6cec3;
      --safe-fg:  #2d6a4f;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--red);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    /* ── PIN GATE ─────────────────────────────────────────────── */
    #gate {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--red);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: max(72px, env(safe-area-inset-top) + 48px) 28px max(28px, env(safe-area-inset-bottom));
      gap: 14px;
    }

    .gate-logo {
      font-family: 'Puradak', sans-serif;
      font-size: 3.2rem;
      color: #fff;
      line-height: 1;
      letter-spacing: 0.02em;
    }

    .gate-logo small {
      font-family: 'Puradak', sans-serif;
      font-size: 1.2rem;
      opacity: 0.6;
      letter-spacing: 0.1em;
      margin-left: 6px;
      vertical-align: baseline;
    }

    .gate-sub {
      font-size: .85rem;
      color: rgba(255,255,255,.6);
      margin-bottom: 6px;
    }

    #pin-input {
      width: 100%;
      max-width: 300px;
      padding: 16px 20px;
      border: none;
      border-radius: 16px;
      background: rgba(255,255,255,.15);
      color: #fff;
      font-size: 1.1rem;
      text-align: center;
      letter-spacing: 0.2em;
      outline: none;
      font-family: inherit;
    }

    #pin-input::placeholder { color: rgba(255,255,255,.4); letter-spacing: 0; }
    #pin-input:focus { background: rgba(255,255,255,.22); }

    #pin-submit {
      width: 100%;
      max-width: 300px;
      padding: 16px;
      border: none;
      border-radius: 16px;
      background: rgba(255,255,255,.92);
      color: var(--red);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }

    #pin-error {
      color: rgba(255,255,255,.9);
      font-size: .85rem;
      background: rgba(0,0,0,.22);
      padding: 8px 16px;
      border-radius: 10px;
    }

    /* ── MAIN APP ─────────────────────────────────────────────── */
    #app {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── RED BAND ─────────────────────────────────────────────── */
    .rh-band {
      background: var(--red);
      padding: max(48px, env(safe-area-inset-top)) 22px 36px;
      flex-shrink: 0;
      position: relative;
      z-index: 2;
    }

    .rh-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .rh-wordmark {
      font-family: 'Puradak', sans-serif;
      font-size: 1.9rem;
      color: #fff;
      letter-spacing: 0.03em;
      line-height: 1;
    }

    .rh-wordmark small {
      font-family: 'Puradak', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.1em;
      opacity: 0.6;
      margin-left: 5px;
    }

    .rh-avatar-wrap {
      position: relative;
      width: 46px;
      height: 46px;
    }

    .rh-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: #fff;
      object-fit: contain;
    }

    .rh-avatar-dot {
      position: absolute;
      top: 1px;
      right: 1px;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: #ff3b30;
      border: 2px solid var(--red);
    }

    #logout-btn {
      position: absolute;
      top: max(52px, calc(env(safe-area-inset-top) + 8px));
      right: 22px;
      background: rgba(255,255,255,.14);
      border: none;
      color: rgba(255,255,255,.65);
      font-size: .72rem;
      padding: 4px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
    }

    .rh-date {
      font-size: .72rem;
      color: rgba(255,255,255,.5);
      margin-bottom: 14px;
      letter-spacing: 0.01em;
    }

    /* Hero stats */
    .rh-stats {
      display: flex;
      align-items: flex-end;
      gap: 0;
    }

    .rh-stat {
      display: flex;
      flex-direction: column;
      padding-right: 20px;
    }

    .rh-stat + .rh-stat {
      padding-left: 20px;
      border-left: 1px solid rgba(255,255,255,.18);
    }

    .rh-stat-count {
      line-height: 1;
      color: #fff;
      font-weight: 200;
      letter-spacing: -0.06em;
    }

    .rh-stat-count.today    { font-size: 5.4rem; }
    .rh-stat-count.tomorrow { font-size: 3.2rem; color: rgba(255,255,255,.55); font-weight: 300; }
    .rh-stat-count.week     { font-size: 2rem;   color: rgba(255,255,255,.35); font-weight: 300; }

    .rh-stat-label {
      font-size: .62rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,.5);
      margin-top: 4px;
    }

    .rh-stat-label.today { color: rgba(255,255,255,.8); }

    /* Toggle overlapping band/sheet boundary */
    .rh-toggle-row {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      transform: translateY(50%);
      z-index: 10;
      pointer-events: auto;
    }

    .rh-toggle {
      display: inline-flex;
      background: var(--cream);
      border-radius: 22px;
      padding: 3px;
      gap: 2px;
      box-shadow: 0 2px 12px rgba(0,0,0,.14);
    }

    .rh-toggle-btn {
      padding: 8px 20px;
      border: none;
      border-radius: 19px;
      background: transparent;
      color: var(--g1);
      font-size: .8rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, color .2s;
      font-family: inherit;
      white-space: nowrap;
    }

    .rh-toggle-btn.active {
      background: var(--red);
      color: #fff;
    }

    /* ── WHITE SHEET ──────────────────────────────────────────── */
    .rh-sheet {
      flex: 1;
      background: #fff;
      border-radius: 28px 28px 0 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }

    .rh-sheet-inner {
      flex: 1;
      overflow-y: auto;
      padding: 34px 0 130px;
      -webkit-overflow-scrolling: touch;
    }

    /* ── SEARCH ROW ───────────────────────────────────────────── */
    .rh-search-row {
      display: flex;
      gap: 8px;
      padding: 0 18px 12px;
    }

    #search-input {
      flex: 1;
      height: 42px;
      padding: 0 14px;
      border: 1.5px solid var(--g3);
      border-radius: 12px;
      font-size: .9rem;
      font-family: inherit;
      background: var(--cream);
      color: var(--ink);
      outline: none;
    }

    #search-input:focus { border-color: var(--red); }

    #expiry-filter {
      height: 42px;
      padding: 0 10px;
      border: 1.5px solid var(--g3);
      border-radius: 12px;
      font-size: .8rem;
      font-family: inherit;
      background: var(--cream);
      color: var(--g1);
      outline: none;
      max-width: 110px;
    }

    #category-filter { display: none; }

    /* ── CATEGORY CHIPS ───────────────────────────────────────── */
    #category-chips {
      display: flex;
      gap: 7px;
      padding: 0 18px 14px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    #category-chips::-webkit-scrollbar { display: none; }

    .chip {
      flex-shrink: 0;
      height: 32px;
      padding: 0 14px;
      border: 1.5px solid var(--g3);
      border-radius: 16px;
      background: transparent;
      color: var(--g1);
      font-size: .8rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background .15s, border-color .15s, color .15s;
      white-space: nowrap;
    }

    .chip.active {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
    }

    /* ── CRISIS ALERT ─────────────────────────────────────────── */
    #crisis-alert {
      margin: 0 18px 12px;
      background: var(--red-tint);
      border: 1px solid var(--red-soft);
      border-radius: 14px;
      padding: 12px 14px;
    }

    #crisis-message {
      font-size: .875rem;
      font-weight: 600;
      color: var(--red);
      margin-bottom: 6px;
    }

    #crisis-item-list {
      font-size: .8rem;
      color: var(--g1);
      padding-left: 16px;
      margin: 0;
    }

    /* ── INVENTORY CARDS ──────────────────────────────────────── */
    #inventory-list {
      padding: 0 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .inv-card {
      background: var(--cream);
      border-radius: 14px;
      padding: 14px 14px 14px 16px;
      display: flex;
      gap: 11px;
      align-items: flex-start;
      position: relative;
      overflow: hidden;
    }

    .inv-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: var(--g3);
      border-radius: 14px 0 0 14px;
    }

    .inv-card.urgent::before { background: var(--red); }
    .inv-card.soon::before   { background: var(--red-soft); }

    .inv-mascot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: contain;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .inv-body {
      flex: 1;
      min-width: 0;
    }

    .inv-name {
      font-size: .95rem;
      font-weight: 600;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .inv-meta {
      font-size: .76rem;
      color: var(--g1);
      margin-top: 2px;
    }

    .inv-dday {
      font-size: .76rem;
      font-weight: 700;
      margin-top: 4px;
    }

    .inv-dday.urgent   { color: var(--red); }
    .inv-dday.today    { color: #c2410c; }
    .inv-dday.tomorrow { color: var(--g1); }
    .inv-dday.safe     { color: var(--safe-fg); }

    .inv-actions {
      display: flex;
      gap: 5px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .inv-btn {
      height: 27px;
      padding: 0 9px;
      border: 1px solid var(--g3);
      border-radius: 8px;
      background: #fff;
      color: var(--g1);
      font-size: .73rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }

    .inv-btn.ai      { color: #4f46e5; border-color: #c7d2fe; background: #eef2ff; }
    .inv-btn.dispose { color: var(--red); border-color: var(--red-soft); background: var(--red-tint); font-weight: 700; }
    .inv-btn.del     { color: var(--red); }

    .inv-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
      flex-shrink: 0;
    }

    .inv-qty  { font-size: 1.15rem; font-weight: 700; color: var(--ink); }
    .inv-unit { font-size: .7rem; color: var(--g2); }

    .inv-low-badge {
      font-size: .67rem;
      font-weight: 700;
      color: var(--red);
      background: var(--red-tint);
      border-radius: 6px;
      padding: 2px 6px;
    }

    /* ── BOTTOM BAR ───────────────────────────────────────────── */
    .rh-bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 18px max(20px, env(safe-area-inset-bottom));
      background: linear-gradient(to top, rgba(255,255,255,.97) 55%, rgba(255,255,255,0));
      backdrop-filter: blur(14px) saturate(150%);
      -webkit-backdrop-filter: blur(14px) saturate(150%);
      display: flex;
      gap: 12px;
      align-items: center;
      z-index: 100;
    }

    #scan-btn {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: #fff;
      border: 1.5px solid var(--g3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.55rem;
      cursor: pointer;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }

    #rh-add-btn {
      flex: 1;
      height: 64px;
      border-radius: 18px;
      background: var(--red);
      border: none;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: -0.01em;
    }

    /* ── ADD ITEM SHEET ───────────────────────────────────────── */
    #add-item-sheet {
      position: fixed;
      inset: 0;
      z-index: 200;
      pointer-events: none;
    }

    #add-item-sheet.open { pointer-events: all; }

    .add-sheet-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.48);
      opacity: 0;
      transition: opacity .3s;
    }

    #add-item-sheet.open .add-sheet-backdrop { opacity: 1; }

    .add-sheet-panel {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff;
      border-radius: 24px 24px 0 0;
      padding: 8px 20px max(28px, env(safe-area-inset-bottom));
      max-height: 92vh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform .35s cubic-bezier(.32,1.25,.41,.98);
      -webkit-overflow-scrolling: touch;
    }

    #add-item-sheet.open .add-sheet-panel { transform: translateY(0); }

    .add-sheet-handle {
      width: 40px;
      height: 4px;
      background: var(--g3);
      border-radius: 2px;
      margin: 12px auto 16px;
    }

    .add-sheet-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 16px;
    }

    #add-item-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .form-row { display: flex; gap: 8px; }
    .form-row .form-input { flex: 1; }

    .form-input, .form-select {
      width: 100%;
      height: 48px;
      padding: 0 14px;
      border: 1.5px solid var(--g3);
      border-radius: 12px;
      font-size: .92rem;
      font-family: inherit;
      background: var(--cream);
      color: var(--ink);
      outline: none;
    }

    .form-input:focus, .form-select:focus { border-color: var(--red); }

    .expiry-row { display: flex; gap: 8px; align-items: center; }

    #expiry-type-toggle {
      flex-shrink: 0;
      height: 48px;
      padding: 0 12px;
      border: 1.5px solid var(--g3);
      border-radius: 12px;
      background: var(--cream);
      color: var(--g1);
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
    }

    #expiry-date-input {
      flex: 1;
      height: 48px;
      padding: 0 14px;
      border: 1.5px solid var(--g3);
      border-radius: 12px;
      font-size: .9rem;
      font-family: inherit;
      background: var(--cream);
      color: var(--ink);
      outline: none;
    }

    .form-submit-btn {
      width: 100%;
      height: 54px;
      border: none;
      border-radius: 16px;
      background: var(--red);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      margin-top: 4px;
    }

    /* ── TOAST ────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 110px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--ink);
      color: #fff;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: .875rem;
      font-weight: 500;
      pointer-events: none;
      opacity: 0;
      transition: opacity .25s;
      z-index: 9999;
      white-space: nowrap;
    }

    #toast.show { opacity: 1; }

    /* ── OCR MODAL ────────────────────────────────────────────── */
    dialog {
      max-width: 500px;
      width: 95vw;
      padding: 1.2rem;
      border: 1px solid var(--g3);
      border-radius: 20px;
      background: #fff;
      font-family: inherit;
    }

    dialog::backdrop { background: rgba(0,0,0,.55); }
    dialog h2 { font-size: 1rem; font-weight: 700; margin-bottom: 12px; }

    dialog fieldset {
      border: 1px solid var(--g3);
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 10px;
    }

    dialog legend {
      font-size: .78rem;
      font-weight: 600;
      color: var(--g1);
      padding: 0 4px;
    }

    .dlg-input {
      display: block;
      width: 100%;
      margin-bottom: 6px;
      padding: 8px 10px;
      border: 1px solid var(--g3);
      border-radius: 8px;
      font-family: inherit;
      font-size: .88rem;
      background: var(--cream);
      color: var(--ink);
      outline: none;
    }

    .dlg-input:focus { border-color: var(--red); }

    .dlg-btn {
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid var(--g3);
      background: var(--cream);
      font-family: inherit;
      cursor: pointer;
      font-size: .82rem;
    }

    .dlg-action-row { display: flex; gap: 8px; margin-top: 10px; }

    .dlg-primary {
      flex: 1; padding: 11px;
      border-radius: 10px; border: none;
      background: var(--red); color: #fff;
      font-weight: 700; cursor: pointer; font-family: inherit;
    }

    .dlg-secondary {
      flex: 1; padding: 11px;
      border-radius: 10px; border: none;
      background: var(--bone); color: var(--ink);
      font-weight: 600; cursor: pointer; font-family: inherit;
    }

    /* ── AI BOTTOM SHEET ──────────────────────────────────────── */
    .ai-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 1000;
      opacity: 0; pointer-events: none;
      transition: opacity .3s;
    }

    .ai-overlay.open { opacity: 1; pointer-events: all; }

    .ai-sheet {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #fff;
      border-radius: 24px 24px 0 0;
      z-index: 1001;
      transform: translateY(100%);
      transition: transform .38s cubic-bezier(.22,1,.36,1);
      max-height: 85vh;
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    .ai-sheet.open { transform: translateY(0); }

    .ai-sheet-header {
      background: var(--ink);
      color: #fff;
      padding: 16px 20px 14px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .ai-sheet-header img {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: #fff;
      object-fit: contain;
      flex-shrink: 0;
    }

    .ai-sheet-header h3 { margin: 0 0 2px; font-size: .95rem; letter-spacing: -.02em; }
    .ai-meta { font-size: .75em; opacity: .62; }

    .ai-sheet-body { padding: 18px 20px; flex: 1; overflow-y: auto; }
    .ai-stream-text { font-size: 1.05em; line-height: 1.65; min-height: 3em; white-space: pre-wrap; }
    .ai-status { font-size: .82em; color: var(--g1); margin-bottom: 10px; }

    .ai-sheet-footer {
      padding: 12px 20px max(20px, env(safe-area-inset-bottom));
      display: flex; gap: 10px;
      border-top: 1px solid var(--bone);
      flex-shrink: 0;
    }

    .ai-sheet-footer button {
      flex: 1; padding: 13px;
      border-radius: 14px; border: none;
      font-size: .95em; font-weight: 600; cursor: pointer;
      font-family: inherit;
    }

    .btn-ai-accept  { background: var(--ink); color: #fff; }
    .btn-ai-dismiss { background: var(--bone); color: var(--ink); }

    /* ── WEBLLM OVERLAY ───────────────────────────────────────── */
    .webllm-loading-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.78);
      z-index: 2000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #fff; text-align: center; padding: 24px;
    }

    .webllm-loading-overlay h4 { margin: 0 0 10px; font-size: 1em; }

    .webllm-load-bar {
      width: 220px; height: 6px;
      background: #444; border-radius: 3px; overflow: hidden;
    }

    .webllm-load-fill {
      height: 100%; background: #818cf8;
      border-radius: 3px; transition: width .3s;
    }

    .webllm-load-pct { margin-top: 8px; font-size: .85em; opacity: .8; }

    /* ── DISPOSAL MODAL ───────────────────────────────────────── */
    #disposal-modal {
      max-width: 460px; width: 95vw;
      padding: 1.2rem;
      border: 1px solid var(--g3);
      border-radius: 16px;
    }

    #disposal-modal::backdrop { background: rgba(0,0,0,.5); }
    #disposal-modal h2 { margin: 0 0 12px; font-size: 1.05em; color: var(--red); }

    #disposal-preview {
      display: block; max-width: 100%; max-height: 180px;
      object-fit: contain; margin: 0 auto 10px; border-radius: 8px;
    }

    #disposal-reason {
      width: 100%; min-height: 70px; resize: vertical;
      padding: 8px 10px;
      border: 1px solid var(--g3); border-radius: 8px;
      font-size: .9em; margin-bottom: 12px;
      box-sizing: border-box; font-family: inherit;
    }

    .disposal-actions { display: flex; gap: 8px; }

    .disposal-actions button {
      flex: 1; padding: 11px;
      border-radius: 10px; border: none;
      font-size: .9em; font-weight: 600; cursor: pointer;
      font-family: inherit;
    }

    .btn-dispose        { background: var(--red); color: #fff; }
    .btn-dispose-cancel { background: var(--bone); color: var(--ink); }
  </style>
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════════
       PIN GATE
  ═══════════════════════════════════════════════════════════ -->

    <h2>📷 기한 스캔 등록</h2>

    <div style="margin-bottom:10px">

  <!-- ═══════════════════════════════════════════════════════════
       SCRIPT
  ═══════════════════════════════════════════════════════════ -->
  <script>
    'use strict';

    // ──────────────────────────────────────────────────────────────
    // CONFIG
    // ──────────────────────────────────────────────────────────────
    const PIN_HASHES = [
      '95088386144d28ddba4ef6d05a1a43fedfcab43ff21c32cfbd7085e60dc08c95',
    ];
    const PIN_SALT = 'tuz.kr/inventory:v1';
    const AUTH_KEY = 'tuz_inv_auth_v1';
    const AUTH_TTL = 30 * 24 * 60 * 60 * 1000;
    const INV_KEY  = 'tuz_inv_data_v1';

    // ──────────────────────────────────────────────────────────────
    // CRYPTO
    // ──────────────────────────────────────────────────────────────
    async function tuzHashPin(pin) {
      const bytes = new TextEncoder().encode(PIN_SALT + ':' + pin);
      const buf   = await crypto.subtle.digest('SHA-256', bytes);
      return Array.from(new Uint8Array(buf))
                  .map(b => b.toString(16).padStart(2, '0'))
                  .join('');
    }
    window.tuzHashPin = tuzHashPin;

    // ──────────────────────────────────────────────────────────────
    // AUTH
    // ──────────────────────────────────────────────────────────────
    function getAuth() {
      try {
        const raw  = localStorage.getItem(AUTH_KEY);
        if (!raw) return null;
        const auth = JSON.parse(raw);
        if (!auth.token || !auth.expires || auth.expires < Date.now()) {
          localStorage.removeItem(AUTH_KEY);
          return null;
        }
        return auth;
      } catch {
        localStorage.removeItem(AUTH_KEY);
        return null;
      }
    }

    function setAuth(pinHash) {
      localStorage.setItem(AUTH_KEY, JSON.stringify({
        token:   pinHash + ':' + Date.now(),
        expires: Date.now() + AUTH_TTL
      }));
    }

    function clearAuth() { localStorage.removeItem(AUTH_KEY); }

    // ──────────────────────────────────────────────────────────────
    // UI TRANSITIONS
    // ──────────────────────────────────────────────────────────────
    const gateEl   = document.getElementById('gate');
    const appEl    = document.getElementById('app');
    const pinInput = document.getElementById('pin-input');
    const pinError = document.getElementById('pin-error');

    function showApp() {
      gateEl.hidden = true;
      appEl.hidden  = false;
      initApp();
    }

    function showGate() {
      appEl.hidden    = true;
      gateEl.hidden   = false;
      pinInput.value  = '';
      pinError.hidden = true;
    }

    // ──────────────────────────────────────────────────────────────
    // PIN SUBMIT
    // ──────────────────────────────────────────────────────────────
    async function handlePinSubmit() {
      const pin = pinInput.value.trim();
      if (!pin) return;
      const hash = await tuzHashPin(pin);
      if (PIN_HASHES.includes(hash)) {
        setAuth(hash);
        showApp();
      } else {
        pinError.hidden = false;
        pinInput.value  = '';
        pinInput.focus();
      }
    }

    document.getElementById('pin-submit')
            .addEventListener('click', handlePinSubmit);
    pinInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') handlePinSubmit();
    });
    document.getElementById('logout-btn')
            .addEventListener('click', () => { clearAuth(); showGate(); });

    // ──────────────────────────────────────────────────────────────
    // ADD SHEET
    // ──────────────────────────────────────────────────────────────
    function openAddSheet() {
      document.getElementById('add-item-sheet').classList.add('open');
    }

    function closeAddSheet() {
      document.getElementById('add-item-sheet').classList.remove('open');
    }

    document.getElementById('rh-add-btn')
            .addEventListener('click', openAddSheet);
    document.getElementById('add-sheet-backdrop')
            .addEventListener('click', closeAddSheet);

    // ──────────────────────────────────────────────────────────────
    // APP INIT
    // ──────────────────────────────────────────────────────────────
    function initApp() {
      updateDateDisplay();
      loadInventory();
    }

    function updateDateDisplay() {
      const days = ['일','월','화','수','목','금','토'];
      const now  = new Date();
      const el   = document.getElementById('rh-date');
      if (el) {
        el.textContent =
          `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 (${days[now.getDay()]})`;
      }
    }

    // ──────────────────────────────────────────────────────────────
    // GLOBAL EXPIRY TYPE TOGGLE
    // ──────────────────────────────────────────────────────────────
    function setGlobalExpiryType(type) {
      document.querySelectorAll('.rh-toggle-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.type === type);
      });
      const tog = document.getElementById('expiry-type-toggle');
      tog.dataset.type = type;
      tog.textContent  = type === 'SELL-BY' ? 'SELL-BY' : 'USE-BY';
      document.getElementById('expiry-type-hidden').value = type;

      const ocrTog = document.getElementById('ocr-type-toggle-btn');
      ocrTog.dataset.type = type;
      ocrTog.textContent  = type === 'SELL-BY' ? 'SELL-BY (유통기한)' : 'USE-BY (소비기한)';
      document.getElementById('ocr-type-hidden').value = type;
    }
    window.setGlobalExpiryType = setGlobalExpiryType;

    // ──────────────────────────────────────────────────────────────
    // D-DAY ENGINE
    // ──────────────────────────────────────────────────────────────
    function calcDDay(isoDate) {
      if (!isoDate) return null;
      const today  = new Date();
      today.setHours(0, 0, 0, 0);
      const expiry = new Date(isoDate + 'T00:00:00');
      return Math.round((expiry - today) / 86_400_000);
    }

    function ddayLabel(d) {
      if (d === null) return '';
      if (d < 0)     return `D+${Math.abs(d)} 초과`;
      if (d === 0)   return 'D-DAY';
      return `D-${d}`;
    }

    function expiryTypeLabel(t) {
      return t === 'USE-BY' ? '소비기한' : '유통기한';
    }

    // ──────────────────────────────────────────────────────────────
    // DATA LAYER
    // ──────────────────────────────────────────────────────────────
    function loadData() {
      try { return JSON.parse(localStorage.getItem(INV_KEY)) || []; }
      catch { return []; }
    }

    function saveData(list) {
      localStorage.setItem(INV_KEY, JSON.stringify(list));
    }

    function buildItem(f) {
      return {
        id:             crypto.randomUUID(),
        name:           (f.name          ?? '').trim(),
        quantity:       Number(f.quantity) || 0,
        unit:           (f.unit           ?? '').trim() || '개',
        category:       (f.category       ?? '').trim(),
        min_quantity:   (f.min_quantity !== null && f.min_quantity !== '' && f.min_quantity !== undefined)
                          ? Number(f.min_quantity) : null,
        expiry_date:    f.expiry_date     || null,
        expiry_type:    f.expiry_type     || 'SELL-BY',
        storage_method: f.storage_method  || '',
        origin:         (f.origin         ?? '').trim(),
        created_at:     new Date().toISOString(),
        updated_at:     new Date().toISOString()
      };
    }

    let items = [];

    function loadInventory() {
      items = loadData();
      refreshAll();
    }

    function refreshAll() {
      refreshDashboard();
      renderList(getFiltered());
      refreshCategories();
    }

    // ──────────────────────────────────────────────────────────────
    // CRISIS DASHBOARD
    // ──────────────────────────────────────────────────────────────
    function refreshDashboard() {
      const withDday = items
        .map(i => ({ ...i, dday: calcDDay(i.expiry_date) }))
        .filter(i => i.dday !== null);

      document.getElementById('tile-today').textContent =
        withDday.filter(i => i.dday === 0).length;
      document.getElementById('tile-tomorrow').textContent =
        withDday.filter(i => i.dday === 1).length;
      document.getElementById('tile-week').textContent =
        withDday.filter(i => i.dday >= 0 && i.dday <= 6).length;

      const urgent  = withDday.filter(i => i.dday <= 0);
      const alertEl = document.getElementById('crisis-alert');

      if (!urgent.length) { alertEl.hidden = true; return; }

      const expired  = urgent.filter(i => i.dday < 0).length;
      const todayCnt = urgent.filter(i => i.dday === 0).length;
      let msg = '';
      if (expired && todayCnt)
        msg = `기한이 지난 재료 ${expired}가지, 오늘 처분해야 할 재료 ${todayCnt}가지가 있어요.`;
      else if (expired)
        msg = `기한이 지난 재료가 ${expired}가지 있어요. 즉시 확인하세요.`;
      else
        msg = `오늘 안에 처분해야 할 재료가 ${todayCnt}가지 있어요.`;

      document.getElementById('crisis-message').textContent = msg;
      document.getElementById('crisis-item-list').innerHTML = urgent
        .sort((a, b) => a.dday - b.dday)
        .map(i => {
          const label = i.dday < 0
            ? `${escHtml(i.name)} — ${Math.abs(i.dday)}일 초과 [${expiryTypeLabel(i.expiry_type)}]`
            : `${escHtml(i.name)} — 오늘 마감 [${expiryTypeLabel(i.expiry_type)}]`;

    const listEl = document.getElementById('inventory-list');

    function renderList(data) {
      if (!data.length) {
        listEl.innerHTML =
          '<p style="text-align:center;color:var(--g2);padding:40px 0;font-size:.9rem">재고 항목이 없습니다.</p>';
        return;
      }

      listEl.innerHTML = data.map(item => {
        const dday       = calcDDay(item.expiry_date);
        const low        = item.min_quantity != null && item.quantity <= item.min_quantity;
        const isExpired  = dday !== null && dday < 0;
        const isToday    = dday === 0;
        const isTomorrow = dday === 1;

        const cardClass = (isExpired || isToday) ? 'inv-card urgent'
                        : isTomorrow             ? 'inv-card soon'
                        : 'inv-card';

        const ddayClass = isExpired  ? 'inv-dday urgent'
                        : isToday    ? 'inv-dday today'
                        : isTomorrow ? 'inv-dday tomorrow'
                        : dday !== null ? 'inv-dday safe'
                        : '';

        const ddayText = item.expiry_date
          ? `${expiryTypeLabel(item.expiry_type)} ${ddayLabel(dday)} · ${item.expiry_date}`
          : '';

        const safeId    = escAttr(item.id);
        const mascotSrc = (isExpired || isToday)
          ? 'assets/mascot-collie.png'
          : 'assets/mascot-poodle.png';

        const metaParts = [
          item.category     ? escHtml(item.category)      : '미분류',
          item.storage_method ? escHtml(item.storage_method) : '',
          item.origin         ? escHtml(item.origin)        : ''
        ].filter(Boolean);

        return `
          <div class="${cardClass}" data-id="${safeId}">
            <img class="inv-mascot" src="${mascotSrc}" alt="">
            <div class="inv-body">
              <div class="inv-name">${escHtml(item.name)}</div>
              <div class="inv-meta">${metaParts.join(' · ')}</div>
              ${ddayText ? `<div class="${ddayClass}">${ddayText}</div>` : ''}
              <div class="inv-actions">
                <button class="inv-btn" onclick="adjustQty('${safeId}')">수량</button>
                <button class="inv-btn" onclick="editExpiry('${safeId}')">기한</button>
                ${item.expiry_date ? `<button class="inv-btn ai" onclick="openAiSheet('${safeId}')">🤖 AI</button>` : ''}
                ${(dday !== null && dday <= 0) ? `<button class="inv-btn dispose" onclick="openDisposalModal('${safeId}')">🗑 폐기</button>` : ''}
                <button class="inv-btn del" onclick="deleteItem('${safeId}')">삭제</button>
              </div>
            </div>
            <div class="inv-right">
              <div class="inv-qty">${item.quantity}</div>
              <div class="inv-unit">${escHtml(item.unit || '개')}</div>
              ${low ? '<div class="inv-low-badge">부족</div>' : ''}
            </div>
          </div>`;
      }).join('');
    }

    function escHtml(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function escAttr(str) {
      return String(str ?? '').replace(/[^a-zA-Z0-9\-_]/g, '');

    async function ensureTesseract() {
      if (_tssLoaded) return;
      if (_tssLoading) {
        return new Promise(res => {
          const t = setInterval(() => {
            if (_tssLoaded) { clearInterval(t); res(); }
          }, 150);
        });
      }
      _tssLoading = true;
      await new Promise((res, rej) => {
        const s    = document.createElement('script');
        s.src      = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
        s.onload   = res;
        s.onerror  = () => rej(new Error('Tesseract.js CDN 로드 실패. 네트워크를 확인하세요.'));
        document.head.appendChild(s);
      });
      _tssLoaded  = true;
      _tssLoading = false;
    }

    async function getOcrWorker() {
      await ensureTesseract();
      if (!_ocrWorker) {
        _ocrWorker = await Tesseract.createWorker('eng');
      }
      return _ocrWorker;
    }

    function parseDatesFromText(text) {
      const now     = new Date();
      const minYear = now.getFullYear() - 1;
      const maxYear = now.getFullYear() + 5;
      const results = [];

      function tryAdd(y, m, d) {
        y = Number(y); m = Number(m); d = Number(d);
        if (y < minYear || y > maxYear) return;
        if (m < 1 || m > 12)           return;
        if (d < 1 || d > 31)           return;
        const dt = new Date(y, m - 1, d);
        if (dt.getMonth() !== m - 1)   return;
        results.push(dt.toISOString().split('T')[0]);
      }

      const patterns = [
        { re: /(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/g,
          fn: m => tryAdd(m[1], m[2], m[3]) },
        { re: /\b(\d{2})[.\-](\d{1,2})[.\-](\d{1,2})\b/g,
          fn: m => tryAdd(2000 + +m[1], m[2], m[3]) },
        { re: /(\d{4})년\s*(\d{1,2})월\s*(\d{1,2})일/g,
          fn: m => tryAdd(m[1], m[2], m[3]) },
        { re: /(?<!\d)(\d{4})(\d{2})(\d{2})(?!\d)/g,
          fn: m => tryAdd(m[1], m[2], m[3]) },
        { re: /(\d{4})\D{1,4}(\d{1,2})\D{1,4}(\d{1,2})(?!\d)/g,
          fn: m => tryAdd(m[1], m[2], m[3]) }
      ];

      for (const { re, fn } of patterns) {
        let m;
        re.lastIndex = 0;
        while ((m = re.exec(text)) !== null) fn(m);
      }

      return [...new Set(results)];
    }

    function pickBestDate(dates) {
      if (!dates.length) return null;
      const today  = new Date();
      today.setHours(0, 0, 0, 0);
      const asDates = dates.map(s => new Date(s + 'T00:00:00'));
      const future  = asDates.filter(d => d >= today).sort((a, b) => a - b);
      if (future.length) return future[0].toISOString().split('T')[0];
      return asDates.sort((a, b) => b - a)[0].toISOString().split('T')[0];
    }

    document.getElementById('scan-btn').addEventListener('click', () => {

    document.getElementById('camera-input').addEventListener('change', async function () {
      const file = this.files[0];

    async function handleCameraFile(file) {
      const dataUrl = await new Promise(res => {
        const reader  = new FileReader();
        reader.onload = e => res(e.target.result);
        reader.readAsDataURL(file);
      });

      openOcrModal(dataUrl, null, true);

      try {
        setOcrStatus('OCR 라이브러리 준비 중…');
        const worker = await getOcrWorker();

        setOcrStatus('날짜 인식 중… (첫 실행 시 10~20초 소요)');
        const { data: { text } } = await worker.recognize(dataUrl);

        const candidates = parseDatesFromText(text);
        const best       = pickBestDate(candidates);

        document.getElementById('ocr-date-result').value = best || '';

        if (best) {
          setOcrStatus(`날짜 인식 완료: ${best} ✓`);
        } else {
          setOcrStatus('날짜를 자동으로 인식하지 못했습니다.\n날짜를 직접 입력하거나 빠른 버튼을 사용하세요.');
        }
      } catch (err) {
        console.error('[OCR]', err);
        setOcrStatus(`오류: ${err.message}\n날짜를 직접 입력해주세요.`);
      } finally {
        document.getElementById('ocr-confirm-btn').disabled = false;
      }
    }

    // ──────────────────────────────────────────────────────────────
    // WEBLLM MODULE
    // ──────────────────────────────────────────────────────────────
    let _webllmEngine  = null;
    let _webllmLoading = false;
    let _webllmReady   = false;

    function checkWebGPU() {
      return typeof navigator.gpu !== 'undefined';
    }

    function selectWebLLMModel() {
      const mem = navigator.deviceMemory;
      return (mem && mem >= 8)
        ? 'gemma-2-2b-it-q4f16_1-MLC'
        : 'Llama-3.2-1B-Instruct-q4f16_1-MLC';
    }

    let _webllmCancelReject = null;

    async function ensureWebLLM() {
      if (_webllmReady) return true;
      if (_webllmLoading) {
        return new Promise(res => {
          const t = setInterval(() => {
            if (_webllmReady || !_webllmLoading) { clearInterval(t); res(_webllmReady); }
          }, 250);
        });
      }
      if (!checkWebGPU()) return false;

      _webllmLoading = true;
      const overlay  = document.getElementById('webllm-overlay');
      overlay.hidden = false;

      const cancelPromise = new Promise((_, reject) => {
        _webllmCancelReject = reject;
        document.getElementById('webllm-cancel-btn').onclick = () => reject(new Error('cancel'));
      });
      const timeoutPromise = new Promise((_, reject) =>
        setTimeout(() => reject(new Error('timeout')), 60000)
      );

      try {
        const webllm = await Promise.race([
          import('https://esm.run/@mlc-ai/web-llm'),
          cancelPromise,
          timeoutPromise
        ]);
        const model  = selectWebLLMModel();

        document.getElementById('webllm-load-msg').textContent =
          `${model.split('-').slice(0,2).join('-')} 다운로드 중…`;

        _webllmEngine = await Promise.race([
          webllm.CreateMLCEngine(model, {
            initProgressCallback: (report) => {
              const pct = Math.round((report.progress || 0) * 100);
              document.getElementById('webllm-load-fill').style.width = pct + '%';
              document.getElementById('webllm-load-pct').textContent  = pct + '%';
            }
          }),
          cancelPromise,
          timeoutPromise
        ]);

        _webllmReady = true;
        return true;
      } catch (err) {
        console.error('[WebLLM]', err);
        return false;
      } finally {
        _webllmLoading = false;
        _webllmCancelReject = null;
        overlay.hidden = true;
        document.getElementById('webllm-load-fill').style.width = '0%';
        document.getElementById('webllm-load-pct').textContent  = '0%';
      }
    }

    async function runAiStream(item) {
      const statusEl  = document.getElementById('ai-status-text');
      const outputEl  = document.getElementById('ai-stream-output');
      const acceptBtn = document.getElementById('ai-accept-btn');

      if (!checkWebGPU()) {
        statusEl.textContent = '';
        outputEl.textContent =
          '⚠️ 이 기기/브라우저는 WebGPU를 지원하지 않습니다.\n' +
          'Chrome 113+ 또는 Safari 17+(iOS 17+)가 필요합니다.';
        return;
      }

      statusEl.textContent = 'AI 모델 로딩 중…';
      const ok = await ensureWebLLM();
      if (!ok) {
        statusEl.textContent = '';
        outputEl.textContent =
          '⚠️ AI 모델 초기화에 실패했습니다.\n네트워크를 확인하거나 날짜를 직접 입력해주세요.';
        return;
      }

      statusEl.textContent = 'AI 분석 중…';

      const dday = calcDDay(item.expiry_date);
      const systemPrompt =
        '당신은 한국 카페 "Tuz"의 식품 안전 전문가 어시스턴트입니다.\n' +
        '재료 정보를 바탕으로 안전한 권장 소비기한(일수)을 계산합니다.\n' +
        '자체 제조 카테고리는 더 짧은 소비기한을 권장합니다.\n' +
        'SELL-BY(유통기한)는 소비 가능 여유가 있고, USE-BY(소비기한)는 마지노선입니다.\n' +
        '반드시 다음 형식으로만 답하세요: "안전한 권장 소비기한은 [숫자]일입니다. 등록할까요?"';

      const userMsg =
        `재료명: ${item.name}\n` +
        `카테고리: ${item.category || '미분류'}\n` +
        `${item.expiry_type}(${expiryTypeLabel(item.expiry_type)}): ${item.expiry_date || '미입력'}\n` +
        `남은 일수: ${dday !== null ? dday + '일' : '알 수 없음'}\n` +
        `보관 방식: ${item.storage_method || '미입력'}`;

      try {
        const stream = await _webllmEngine.chat.completions.create({
          messages: [
            { role: 'system', content: systemPrompt },
            { role: 'user',   content: userMsg }
          ],
          stream:      true,
          temperature: 0.2,
          max_tokens:  60
        });

        let fullText = '';
        for await (const chunk of stream) {
          const delta = chunk.choices[0]?.delta?.content || '';
          fullText += delta;
          outputEl.textContent = fullText;

          const m = fullText.match(/안전한 권장 소비기한은 (\d+)일/);
          if (m) {
            const days = parseInt(m[1], 10);
            const base = item.expiry_date
              ? new Date(item.expiry_date + 'T00:00:00')
              : (() => { const d = new Date(); d.setHours(0,0,0,0); return d; })();
            base.setDate(base.getDate() + days);
            _aiSuggestedDate = base.toISOString().split('T')[0];
          }
        }

        statusEl.textContent = _aiSuggestedDate ? `추천 기한: ${_aiSuggestedDate}` : '';
        if (_aiSuggestedDate) acceptBtn.disabled = false;

      } catch (err) {
        console.error('[AI stream]', err);
        statusEl.textContent = '';
        outputEl.textContent = `⚠️ AI 추론 중 오류: ${err.message}`;
      }
    }

    document.getElementById('ai-accept-btn').addEventListener('click', () => {
      if (_aiCurrentItem && _aiSuggestedDate) {
        const item = items.find(i => i.id === _aiCurrentItem.id);
        if (item) {
          item.expiry_date = _aiSuggestedDate;
          item.updated_at  = new Date().toISOString();
          saveData(items);
          refreshAll();
          showToast(`[${item.name}] AI 권장 기한(${_aiSuggestedDate})으로 업데이트됐습니다.`);
        }
      }
      closeAiSheet();
    });

    document.getElementById('ai-dismiss-btn').addEventListener('click', closeAiSheet);
    document.getElementById('ai-overlay').addEventListener('click', e => {
      if (e.target === document.getElementById('ai-overlay')) closeAiSheet();
    });

    window.openAiSheet = openAiSheet;

    // ──────────────────────────────────────────────────────────────
    // DISPOSAL FLOW
    // ──────────────────────────────────────────────────────────────
    const DISP_KEY = 'tuz_inv_disposals_v1';

    function loadDisposals() {
      try { return JSON.parse(localStorage.getItem(DISP_KEY)) || []; }
      catch { return []; }
    }

    function saveDisposals(list) {
      localStorage.setItem(DISP_KEY, JSON.stringify(list));
    }

    let _disposalItemId    = null;
    let _disposalPhotoData = null;

    function openDisposalModal(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;

      _disposalItemId    = id;
      _disposalPhotoData = null;

      const dday = calcDDay(item.expiry_date);
      document.getElementById('disposal-item-label').textContent =
        `${item.name} · ${expiryTypeLabel(item.expiry_type)} ${item.expiry_date || '기한 미입력'}` +
        (dday !== null ? ` (${ddayLabel(dday)})` : '');

      document.getElementById('disposal-reason').value   = '';
      document.getElementById('disposal-camera').value   = '';
      const preview  = document.getElementById('disposal-preview');
      preview.src    = '';
      preview.hidden = true;

      const modal = document.getElementById('disposal-modal');
      if (typeof modal.showModal === 'function') modal.showModal();
      else modal.setAttribute('open', '');
    }

    function closeDisposalModal() {
      const modal = document.getElementById('disposal-modal');
      if (typeof modal.close === 'function') modal.close();
      else modal.removeAttribute('open');
      _disposalItemId    = null;
      _disposalPhotoData = null;
    }

    async function resizeImageTo400(dataUrl) {
      return new Promise(res => {
        const img    = new Image();
        img.onload   = () => {
          const MAX  = 400;
          let { width: w, height: h } = img;
          if (w > MAX || h > MAX) {
            const ratio = Math.min(MAX / w, MAX / h);
            w = Math.round(w * ratio);
            h = Math.round(h * ratio);
          }
          const canvas = document.createElement('canvas');
          canvas.width  = w;
          canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          res(canvas.toDataURL('image/jpeg', 0.6));
        };
        img.src = dataUrl;
      });
    }

    document.getElementById('disposal-photo-btn').addEventListener('click', () => {
      document.getElementById('disposal-camera').click();
    });

    document.getElementById('disposal-camera').addEventListener('change', async function () {
      const file = this.files[0];
      this.value = '';
      if (!file) return;

      const reader  = new FileReader();
      const dataUrl = await new Promise(res => {
        reader.onload = e => res(e.target.result);
        reader.readAsDataURL(file);
      });

      _disposalPhotoData = await resizeImageTo400(dataUrl);
      const preview  = document.getElementById('disposal-preview');
      preview.src    = _disposalPhotoData;
      preview.hidden = false;
    });

    document.getElementById('disposal-confirm-btn').addEventListener('click', () => {
      const reason = document.getElementById('disposal-reason').value.trim();
      if (!reason) {
        alert('폐기 사유를 입력하세요.');
        document.getElementById('disposal-reason').focus();
        return;
      }

      const item = items.find(i => i.id === _disposalItemId);
      if (!item) { closeDisposalModal(); return; }

      const disposals = loadDisposals();
      const record = {
        id:          crypto.randomUUID(),
        item_id:     item.id,
        item_name:   item.name,
        category:    item.category || '',
        disposed_at: new Date().toISOString(),
        reason,
        photo_thumb: _disposalPhotoData || null
      };
      disposals.unshift(record);

      try {
        saveDisposals(disposals);
      } catch (e) {
        if (e.name === 'QuotaExceededError') {
          record.photo_thumb = null;
          try { saveDisposals(disposals); } catch { /* ignore */ }
        }
      }

      items = items.filter(i => i.id !== _disposalItemId);
      saveData(items);
      refreshAll();
      closeDisposalModal();
      showToast(`[${item.name}] 폐기 처리 완료.`);
    });

    document.getElementById('disposal-cancel-btn').addEventListener('click', closeDisposalModal);

    window.openDisposalModal = openDisposalModal;

    // ──────────────────────────────────────────────────────────────
    // BOOT
    // ──────────────────────────────────────────────────────────────
    if (getAuth()) {
      showApp();
    } else {
      showGate();
    }
  </script>
</body>
</html>
