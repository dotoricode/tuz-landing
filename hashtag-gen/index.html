<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
<meta name="theme-color" content="#f3f3f3"/>
<meta name="robots" content="noindex,nofollow"/>
<title>TUZ · 해시태그 만들기</title>
<meta name="description" content="TUZ 인스타그램 게시글 본문 기반 해시태그 생성기"/>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23a52a1a'/%3E%3Ctext x='50%25' y='56%25' text-anchor='middle' font-family='Georgia,serif' font-size='28' font-weight='600' fill='%23f4ecda'%3ETUZ%3C/text%3E%3C/svg%3E"/>
<link rel="stylesheet" href="../styles.css?v=55"/>
<style>
  :root {
    --hash-bg: #f3f3f3;
    --hash-card: #ffffff;
    --hash-cream: #f7f7f7;
    --hash-mint: #ededed;
    --hash-coral: #f5f5f5;
    --hash-lime: #e9e9e9;
    --hash-red: #a52a1a;
    --hash-red-deep: #7a1d10;
    --hash-red-soft: rgba(165, 42, 26, 0.07);
    --hash-red-line: rgba(165, 42, 26, 0.16);
    --hash-ink: #171412;
    --hash-muted: #747474;
    --hash-soft-line: rgba(26, 22, 18, 0.12);
  }

  * { -webkit-tap-highlight-color: transparent; }

  body {
    min-height: 100dvh;
    display: block;
    background: var(--hash-bg);
    overscroll-behavior-y: auto;
  }

  .hash-shell {
    min-height: 100dvh;
    display: grid;
    place-items: center;
    padding: 0;
    background: var(--hash-bg);
  }

  .splash {
    position: fixed;
    inset: 0;
    z-index: 20;
    display: grid;
    place-items: center;
    overflow: hidden;
    background: #f4f4f4;
    color: #fff;
    transition: opacity 520ms ease, visibility 520ms ease;
    pointer-events: none;
    animation: splashAutoOut 0.8s 0.1s ease forwards;
  }

  .splash[hidden] { display: none; }

  .splash::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(0, 0, 0, 0.04)),
      url("/hashtag-gen/assets/splash-open.png") center / cover no-repeat;
    will-change: transform;
  }

  .splash.is-loading::before {
    transform: scale(1);
  }

  .splash__message {
    position: relative;
    z-index: 1;
    display: inline-block;
    max-width: 280px;
    color: rgba(23, 20, 18, 0.52);
    font-family: var(--font-sans);
    font-size: 34px;
    font-weight: 600;
    line-height: 1.2;
    letter-spacing: 1.5px;
    text-align: center;
    text-shadow:
      1px 1px 0 rgba(255, 255, 255, 0.78),
      0 5px 12px rgba(31, 28, 22, 0.04);
    transform: translateY(-20px) rotate(-4deg);
  }

  .splash__message span {
    display: inline-block;
  }

  .scribble-line--top { transform: translateX(4px) rotate(-1deg); }
  .scribble-line--bottom { transform: translateX(-3px) rotate(2deg); }
  .scribble-line--bottom .scribble-word { margin-left: 8px; }
  .scribble-char:nth-child(1) { transform: translateY(2px) rotate(-7deg); }
  .scribble-char:nth-child(2) { transform: translateY(-2px) rotate(4deg); }
  .scribble-char:nth-child(3) { transform: translateY(1px) rotate(-3deg); }
  .scribble-char:nth-child(4) { transform: translateY(-1px) rotate(5deg); }
  .scribble-char:nth-child(5) { transform: translateY(2px) rotate(-4deg); }
  .scribble-char:nth-child(6) { transform: translateY(-2px) rotate(3deg); }

  .splash.is-done {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  @keyframes splashAutoOut {
    0%, 55% {
      opacity: 1;
      visibility: visible;
    }
    100% {
      opacity: 0;
      visibility: hidden;
    }
  }

  /* ── PIN GATE ─────────────────────────────────────────────── */
  #pin-gate {
    position: fixed;
    inset: 0;
    z-index: 15;
    background: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: env(safe-area-inset-top, 24px) 32px env(safe-area-inset-bottom, 32px);
    gap: 0;
  }

  #pin-gate[hidden] { display: none !important; }

  .pg-title {
    font-size: 1.08rem;
    font-weight: 700;
    color: #1a1714;
    text-align: center;
    line-height: 1.5;
    margin: 0 0 32px;
  }

  .pg-dots {
    display: flex;
    gap: 20px;
    margin: 0 0 52px;
  }

  .pg-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #d7d7d7;
    transition: background-color .12s ease, transform .1s ease;
  }

  .pg-dot.filled {
    background: var(--hash-red-deep);
    transform: scale(1.06);
  }

  .pg-keypad {
    display: grid;
    grid-template-columns: repeat(3, 72px);
    gap: 10px 16px;
  }

  .pg-key {
    height: 72px;
    border: none;
    border-radius: 999px;
    background: #f4f3f0;
    color: #1a1714;
    font-family: inherit;
    font-size: 1.65rem;
    font-weight: 400;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    transition: background-color .08s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .pg-key:active { background: #e0e0e0; }

  .pg-key.pg-empty {
    background: none;
    pointer-events: none;
    cursor: default;
  }

  .pg-key.pg-delete {
    background: none;
    color: #1a1714;
    font-size: 1rem;
  }

  .pg-key.pg-delete:active { background: #eeeeee; }

  #pg-error {
    margin-top: 26px;
    font-size: .88rem;
    color: var(--hash-red-deep);
    font-weight: 600;
    min-height: 1.2em;
    text-align: center;
  }

  @keyframes pgShake {
    0%, 100% { transform: translateX(0); }
    20%       { transform: translateX(-9px); }
    40%       { transform: translateX(9px); }
    60%       { transform: translateX(-6px); }
    80%       { transform: translateX(6px); }
  }

  .phone {
    position: relative;
    width: min(100vw, 430px);
    min-height: 100dvh;
    background: var(--hash-card);
    color: var(--hash-ink);
    overflow-x: hidden;
    overflow-y: auto;
  }

  @media (min-width: 520px) {
    .hash-shell {
      padding: 24px;
    }

    .splash__message {
      font-size: 38px;
      transform: translateY(-12px) rotate(-4deg);
    }

    .phone {
      width: 390px;
      min-height: 820px;
      max-height: 900px;
      border: 12px solid #171412;
      border-radius: 46px;
      box-shadow: 0 34px 70px rgba(0, 0, 0, 0.2);
    }
  }

  .phone__top {
    display: grid;
    grid-template-columns: 34px 1fr 34px;
    align-items: center;
    gap: 8px;
    padding: 22px 22px 0;
  }

  .icon-button {
    width: 34px;
    height: 34px;
    display: inline-grid;
    place-items: center;
    border: 0;
    border-radius: 999px;
    color: var(--hash-ink);
    background: transparent;
    text-decoration: none;
    cursor: pointer;
  }

  .composer-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 24px 12px;
    border-bottom: 1px solid rgba(26, 22, 18, 0.08);
  }

  .composer-head strong {
    font-size: 17px;
    font-weight: 750;
  }

  .composer-meta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    color: var(--hash-muted);
    font-size: 15px;
    font-weight: 650;
  }

  .composer-main {
    display: grid;
    grid-template-rows: auto auto 1fr auto;
    gap: 16px;
    min-height: calc(100dvh - 170px);
    padding: 18px 24px calc(env(safe-area-inset-bottom) + 22px);
  }

  @media (min-width: 520px) {
    .composer-main {
      min-height: 650px;
      padding-bottom: 28px;
    }
  }

  .body-card {
    border: 1px solid rgba(26, 22, 18, 0.12);
    border-radius: 16px;
    background: #fff;
    overflow: hidden;
  }

  .post-body {
    width: 100%;
    min-height: 255px;
    display: block;
    border: 0;
    resize: vertical;
    padding: 18px;
    color: var(--hash-ink);
    background: var(--hash-cream);
    font-family: var(--font-sans);
    font-size: 16px;
    line-height: 1.6;
    letter-spacing: 0;
  }

  .post-body:focus {
    outline: none;
    box-shadow: inset 0 0 0 2px rgba(165, 42, 26, 0.14);
  }

  .post-body::placeholder {
    color: #8a8a8a;
  }

  .caption-copy {
    text-align: center;
    padding: 2px 4px 4px;
  }

  .caption-copy h1 {
    margin: 0 0 8px;
    font-size: 23px;
    line-height: 1.18;
    letter-spacing: 0;
    font-weight: 800;
  }

  .caption-copy p {
    margin: 0;
    color: #303030;
    font-size: 17px;
    line-height: 1.42;
    font-weight: 650;
  }

  .caption-copy .muted {
    display: block;
    margin-top: 7px;
    color: var(--hash-muted);
    font-weight: 650;
  }

  .result-panel {
    display: grid;
    gap: 12px;
    padding: 14px;
    border: 1px solid rgba(26, 22, 18, 0.12);
    border-radius: 10px;
    background: var(--hash-coral);
  }

  .result-panel[hidden] { display: none; }

  .result-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  .result-head strong {
    font-size: 15px;
  }

  .result-head span {
    color: var(--hash-muted);
    font-size: 12px;
  }

  .copy-text {
    color: var(--hash-ink);
    font-size: 13px;
    line-height: 1.55;
    overflow-wrap: anywhere;
  }

  .set-list {
    display: grid;
    gap: 9px;
  }

  .set-card {
    display: grid;
    gap: 8px;
    width: 100%;
    padding: 10px;
    border: 1px solid rgba(23, 20, 18, 0.14);
    border-radius: 8px;
    background: #fff;
    color: var(--hash-ink);
    text-align: left;
    cursor: pointer;
  }

  .set-card.is-selected {
    border-color: var(--hash-red-deep);
    box-shadow: inset 0 0 0 1px var(--hash-red-deep);
  }

  .set-card__top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }

  .set-card strong {
    font-size: 13px;
    line-height: 1.3;
  }

  .set-card small {
    color: var(--hash-muted);
    font-size: 11px;
    line-height: 1.35;
  }

  .set-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .set-tag {
    display: inline-flex;
    padding: 4px 7px;
    border: 1px solid rgba(23, 20, 18, 0.12);
    border-radius: 999px;
    background: #f6f6f6;
    color: #232323;
    font-size: 11px;
  }

  .set-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .secondary-button {
    min-height: 36px;
    border: 1px solid rgba(23, 20, 18, 0.18);
    border-radius: 999px;
    background: #fff;
    color: var(--hash-ink);
    font: inherit;
    font-size: 12px;
    font-weight: 750;
    cursor: pointer;
  }

  .secondary-button--accent {
    border-color: var(--hash-red-deep);
    color: var(--hash-red-deep);
  }

  .impact-panel {
    display: grid;
    gap: 7px;
    padding-top: 4px;
  }

  .impact-chart {
    width: 100%;
    height: 128px;
    border: 1px solid rgba(23, 20, 18, 0.12);
    border-radius: 8px;
    background: #fff;
  }

  .impact-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 10px;
    color: var(--hash-muted);
    font-size: 11px;
  }

  .legend-dot {
    display: inline-block;
    width: 18px;
    height: 2px;
    margin-right: 4px;
    vertical-align: middle;
    background: currentColor;
  }

  .disclaimer {
    margin: 0;
    color: var(--hash-muted);
    font-size: 11px;
    line-height: 1.4;
  }

  .tag-groups {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
  }

  .tag-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 7px 9px;
    border-radius: 999px;
    background: #fff;
    border: 1px solid rgba(26, 22, 18, 0.1);
    color: #2f2b27;
    font-size: 12px;
  }

  .tag-chip--alt {
    border-color: rgba(165, 42, 26, 0.18);
    background: rgba(255, 255, 255, 0.82);
    cursor: pointer;
  }

  .tag-chip button {
    width: 17px;
    height: 17px;
    border: 0;
    border-radius: 50%;
    background: var(--hash-red-soft);
    color: var(--hash-red);
    line-height: 17px;
    padding: 0;
    cursor: pointer;
  }

  .result-subhead {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-top: 2px;
  }

  .result-subhead strong {
    font-size: 13px;
  }

  .result-subhead span {
    color: var(--hash-muted);
    font-size: 12px;
  }

  .extra-panel[hidden] {
    display: none;
  }

  .admin-panel {
    display: grid;
    gap: 8px;
    padding: 10px 12px;
    border: 1px solid rgba(26, 22, 18, 0.08);
    border-radius: 14px;
    background: rgba(255, 252, 248, 0.92);
  }

  .admin-panel[hidden] {
    display: none;
  }

  .admin-field {
    display: grid;
    gap: 6px;
  }

  .admin-field span {
    color: #333333;
    font-size: 12px;
    font-weight: 700;
  }

  .admin-field input {
    width: 100%;
    height: 38px;
    border: 1px solid rgba(26, 22, 18, 0.12);
    border-radius: 12px;
    padding: 0 12px;
    color: var(--hash-ink);
    background: #fff;
    font: inherit;
  }

  .admin-note {
    margin: 0;
    color: var(--hash-muted);
    font-size: 12px;
    line-height: 1.45;
  }

  .bottom-bar {
    display: grid;
    grid-template-columns: minmax(56px, 1fr) auto minmax(28px, 1fr);
    align-items: center;
    gap: 12px;
    margin-top: auto;
  }

  .time-left,
  .info-button {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--hash-ink);
    font-size: 14px;
    font-weight: 750;
  }

  .time-left {
    min-width: 56px;
    white-space: nowrap;
  }

  .info-button {
    justify-self: end;
    width: 28px;
    height: 28px;
    justify-content: center;
    border: 0;
    border-radius: 50%;
    background: transparent;
    cursor: pointer;
  }

  .answer-button {
    min-width: 118px;
    height: 46px;
    border: 1px solid var(--hash-ink);
    border-radius: 999px;
    background: var(--hash-ink);
    color: #ffffff;
    font-family: var(--font-sans);
    font-size: 16px;
    font-weight: 750;
    cursor: pointer;
    box-shadow: 0 12px 24px rgba(26, 22, 18, 0.16);
    transition: transform 150ms ease, box-shadow 150ms ease, background 150ms ease;
  }

  .answer-button:active {
    transform: scale(0.96);
    background: var(--hash-red-deep);
    border-color: var(--hash-red-deep);
    box-shadow: 0 5px 12px rgba(122, 29, 16, 0.18);
  }

  .action-cluster {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    justify-self: center;
  }

  .status {
    min-height: 18px;
    color: var(--hash-red-deep);
    font-size: 12px;
    text-align: center;
  }

  .basis-dialog {
    width: min(330px, calc(100vw - 40px));
    border: 1px solid rgba(23, 20, 18, 0.18);
    border-radius: 12px;
    padding: 0;
    color: var(--hash-ink);
    background: #fff;
    box-shadow: 0 22px 60px rgba(0, 0, 0, 0.26);
  }

  .basis-dialog::backdrop {
    background: rgba(0, 0, 0, 0.44);
  }

  .basis-inner {
    display: grid;
    gap: 12px;
    padding: 18px;
  }

  .basis-inner h2 {
    margin: 0;
    font-size: 18px;
    line-height: 1.25;
  }

  .basis-inner p,
  .basis-inner li {
    color: #4c4c4c;
    font-size: 13px;
    line-height: 1.45;
  }

  .basis-inner p { margin: 0; }
  .basis-inner ul { margin: 0; padding-left: 18px; }

  .home-indicator {
    width: 128px;
    height: 5px;
    margin: 6px auto 0;
    border-radius: 999px;
    background: var(--hash-ink);
  }
</style>
</head>
<body>
  <main class="hash-shell">
    <div id="pin-gate" hidden aria-label="PIN 입력">
      <p class="pg-title">PIN을 입력해 주세요</p>
      <div class="pg-dots" id="pg-dots" aria-live="polite" aria-label="입력된 자리수"></div>
      <div class="pg-keypad" id="pg-keypad" aria-label="PIN 숫자 키패드"></div>
      <p id="pg-error" role="status" aria-live="polite"></p>
    </div>

    <section class="splash" id="splash" aria-label="해시태그 생성기 시작">
      <p class="splash__message" aria-hidden="true">
        <span class="scribble-line scribble-line--top">
          <span class="scribble-char">w</span><span class="scribble-char">h</span><span class="scribble-char">a</span><span class="scribble-char">t</span><span class="scribble-char">'</span><span class="scribble-char">s</span>
        </span><br/>
        <span class="scribble-line scribble-line--bottom">
          <span class="scribble-word">
            <span class="scribble-char">g</span><span class="scribble-char">o</span><span class="scribble-char">i</span><span class="scribble-char">n</span><span class="scribble-char">g</span>
          </span>
          <span class="scribble-word">
            <span class="scribble-char">o</span><span class="scribble-char">n</span><span class="scribble-char">?</span>
          </span>
        </span>
      </p>
    </section>

    <section class="phone" aria-label="TUZ 해시태그 생성기">
      <div class="phone__top">
        <a class="icon-button" href="../" aria-label="홈으로">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
        </a>
        <span aria-hidden="true"></span>
        <span></span>
      </div>

      <header class="composer-head">
        <strong>from Tuz</strong>
        <span class="composer-meta">@ tuzz2026</span>
      </header>

      <section class="composer-main">
        <div class="body-card">
          <textarea class="post-body" id="memo" maxlength="500" aria-label="인스타그램 게시글 본문" placeholder="인스타그램에 올릴 본문을 여기에 작성해 주세요.&#10;&#10;예: 오늘은 크림라떼가 잘 나왔어요. 조용한 오후에 들르기 좋아요."></textarea>
        </div>

        <div class="caption-copy">
          <h1>Hashtag helper</h1>
          <p>게시글 본문을 기준으로<br/>관련 해시태그를 골라드려요</p>
          <span class="muted">사진 업로드는 다음 단계에서 추가</span>
        </div>

        <section class="result-panel" id="resultState" hidden>
          <div class="result-head">
            <div>
              <strong>해시태그 세트 선택</strong>
              <span id="summary">마음에 드는 세트를 골라 복사하세요.</span>
            </div>
            <button class="icon-button" id="copyBtn" type="button" aria-label="전체 복사">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="8" y="8" width="12" height="12" rx="2"/><path d="M16 8V6a2 2 0 00-2-2H6a2 2 0 00-2 2v8a2 2 0 002 2h2"/></svg>
            </button>
          </div>
          <div class="copy-text" id="copyText"></div>
          <div class="set-list" id="setList"></div>
          <div class="impact-panel">
            <div class="result-subhead">
              <strong>7일 예상 파급력</strong>
              <span id="impactSummary">선택 세트 기준</span>
            </div>
            <svg class="impact-chart" id="impactChart" viewBox="0 0 320 128" role="img" aria-label="세트별 7일 예상 파급력 꺾은선 차트"></svg>
            <div class="impact-legend" id="impactLegend"></div>

function normalizeTag(value) {
  const cleaned = String(value || '')
    .trim()
    .replace(/[,\s]+/g, '')
    .replace(/^#+/, '')
    .replace(/[^0-9A-Za-z_가-힣]/g, '');
  if (!cleaned) return '';
  return `#${cleaned}`;
}

function uniqTags(tags) {
  const seen = new Set();
  return (Array.isArray(tags) ? tags : []).map(normalizeTag).filter(tag => {
    const key = tag.toLowerCase();
    if (!tag || /^#test\d*$/i.test(tag) || seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

function compactText(value) {
  return String(value || '').toLowerCase().replace(/\s+/g, '');
}

function sameTagList(left, right) {
  return uniqTags(left).join('|').toLowerCase() === uniqTags(right).join('|').toLowerCase();
}

function replaceLegacyTagList(tags, legacy, nextTags) {
  return sameTagList(tags, legacy) ? [...nextTags] : uniqTags(tags);
}

function limitGroups(groups, maxTags = 24) {
  let remaining = maxTags;
  return groups.map(group => {
    const tags = group.tags.slice(0, remaining);
    remaining -= tags.length;
    return { ...group, tags };
  }).filter(group => group.tags.length);
}

function dedupeGroups(groups) {
  const seen = new Set();
  return groups.map(group => {
    const tags = group.tags.filter(tag => {
      const key = tag.toLowerCase();
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });
    return { ...group, tags };
  }).filter(group => group.tags.length);
}

function keywordTags(text) {
  const source = String(text || '').toLowerCase();
  const pairs = [
    ['크림', '#크림라떼'],
    ['라떼', '#라떼'],
    ['아메리카노', '#아메리카노'],
    ['커피', '#커피맛집'],
    ['디저트', '#디저트맛집'],
    ['쿠폰', '#쿠폰이벤트'],
    ['이벤트', '#이벤트중'],
    ['조용', '#조용한카페'],
    ['오후', '#오후카페'],
    ['신메뉴', '#신메뉴출시'],
    ['말차', '#말차라떼'],
    ['초코', '#초코디저트'],
    ['딸기', '#딸기디저트'],
    ['말차', '#말차맛집'],
    ['케이크', '#케이크맛집'],
    ['반구동', '#반구동카페'],
    ['울산', '#울산카페']
  ];
  return pairs.filter(([keyword]) => source.includes(keyword)).map(([, tag]) => tag);
}

function menuTagsFromMemo(memoText, context) {
  const memoCompact = compactText(memoText);
  const menuTags = Array.isArray(context.menuTags) ? context.menuTags : [];
  return menuTags.filter(tag => {
    const plain = compactText(String(tag).replace(/^#/, ''));
    return plain && memoCompact.includes(plain);
  });
}

function formatCopyText(groups) {
  return groups.flatMap(group => group.tags).join(' ');
}

function buildFallbackTags({ memoText, context }) {
  const memoTags = keywordTags(memoText);
  const menuTags = Array.isArray(context.menuTags) ? context.menuTags.slice(0, 5) : [];
  const groups = [
    { key: 'recommended', label: '추천', tags: uniqTags([...memoTags, ...FALLBACK_CONTEXT.baseTags]).slice(0, 12) },
    { key: 'menu', label: '메뉴', tags: uniqTags(menuTags).slice(0, 5) },
    { key: 'local', label: '지역', tags: uniqTags(context.localTags || FALLBACK_CONTEXT.localTags).slice(0, 5) },
    { key: 'brand', label: 'TUZ', tags: uniqTags(context.brandTags || FALLBACK_CONTEXT.brandTags).slice(0, 5) }
  ];
  return limitGroups(dedupeGroups(groups.filter(group => group.tags.length)));
}

function escapeHtml(value) {
  return String(value || '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

async function loadCafeContext() {
  try {
    const headers = {
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
      Accept: 'application/json'
    };
    const [menuResponse, pickResponse, settingsResponse] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/menu?select=name,category&order=sort_order.asc&limit=20`, { headers }),
      fetch(`${SUPABASE_URL}/rest/v1/pick?select=name,menu:menu_id(name)&order=sort_order.asc&limit=4`, { headers }),
      fetch(`${SUPABASE_URL}/rest/v1/hashtag_settings?select=required_brand_tags,required_local_tags&id=eq.1&limit=1`, { headers })
    ]);
    if (!menuResponse.ok || !pickResponse.ok || !settingsResponse.ok) throw new Error('context fetch failed');
    const [menu, picks, settingsRows] = await Promise.all([menuResponse.json(), pickResponse.json(), settingsResponse.json()]);
    const menuNames = (menu || []).map(item => item.name).filter(Boolean);
    const pickNames = (picks || []).map(item => item.menu?.name || item.name).filter(Boolean);
    const menuTags = uniqTags([...pickNames, ...menuNames].slice(0, 10).map(name => `#${name}`));
    const settings = settingsRows?.[0] || {};
    const brandTags = replaceLegacyTagList(settings.required_brand_tags || FALLBACK_CONTEXT.brandTags, ['#tuzz2026', '#투즈', '#TUZ'], FALLBACK_CONTEXT.brandTags);
    const localTags = replaceLegacyTagList(settings.required_local_tags || FALLBACK_CONTEXT.localTags, ['#울산카페', '#성남동카페', '#울산중구카페'], FALLBACK_CONTEXT.localTags);
    state.context = { ...FALLBACK_CONTEXT, menuTags, brandTags, localTags };
  } catch (err) {
    console.info('[hashtag-gen] cafe context fallback:', err?.message || err);
  }
}

async function requestTags() {
  const memoText = memo.value.trim();
  const payload = {
    postType: state.postType,
    memo: memoText,
    includeLocalTags: true,
    includeBrandTags: true,
    variantSeed: state.variantSeed
  };

  try {
    const response = await fetch('/api/hashtag-gen', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await response.json().catch(() => ({}));
    if (!response.ok) {
      throw new Error(data.error || '해시태그 데이터 연결이 필요해요.');
    }
    if (!Array.isArray(data.tags) || !data.tags.length) throw new Error('empty result');
    return data;
  } catch (err) {
    console.info('[hashtag-gen] api error:', err?.message || err);
    throw err;
  }
}

function normalizeSets(data) {
  const sets = Array.isArray(data.sets) && data.sets.length ? data.sets : fallbackSetFromLegacy(data);
  return sets.map((set, index) => ({
    ...set,
    id: set.id || `set_${index}`,
    title: set.title || `세트 ${index + 1}`,
    description: set.description || '',
    tags: uniqTags(set.tags || String(set.copyText || '').split(/\s+/)),
    copyText: set.copyText || uniqTags(set.tags || []).join(' '),
    simulation: Array.isArray(set.simulation) ? set.simulation.slice(0, 7) : []

}

function selectedSet() {

function renderSetCards() {

function renderImpactChart() {
  const width = 320;
  const height = 128;
  const pad = 18;
  const values = state.sets.flatMap(set => (set.simulation || []).map(point => Number(point.impact) || 0));
  const max = Math.max(1, ...values);
  const min = Math.min(...values, max);
  const range = Math.max(1, max - min);
  const colors = ['#7a1d10', '#171717', '#888888', '#4d4d4d'];
  const grid = [0.25, 0.5, 0.75].map(ratio => {
    const y = pad + (height - pad * 2) * ratio;
    return `<line x1="${pad}" y1="${y}" x2="${width - pad}" y2="${y}" stroke="#e1e1e1" stroke-width="1"/>`;
  }).join('');
  const lines = state.sets.map((set, index) => {
    const points = (set.simulation || []).map((point, pointIndex) => {
      const x = pad + pointIndex * ((width - pad * 2) / 6);
      const y = height - pad - (((Number(point.impact) || min) - min) / range) * (height - pad * 2);
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    }).join(' ');
    const selected = index === state.selectedSetIndex;
    return `<polyline points="${points}" fill="none" stroke="${colors[index % colors.length]}" stroke-width="${selected ? 3 : 2}" opacity="${selected ? 1 : 0.55}" stroke-linecap="round" stroke-linejoin="round"/>`;
  }).join('');
  impactChart.innerHTML = `${grid}${lines}`;
  impactLegend.innerHTML = state.sets.map((set, index) => `
    <span style="color:${colors[index % colors.length]}"><span class="legend-dot"></span>${escapeHtml(set.title)}</span>
  `).join('');
  const current = selectedSet();
  const last = current?.simulation?.[current.simulation.length - 1];
  impactSummary.textContent = last ? `7일차 예상 ${last.impact.toLocaleString('ko-KR')}` : '선택 세트 기준';
}

// PIN GATE
// ──────────────────────────────────────────────────────────────
const PIN_GATE_SALT = 'hashtag-gen.tuz.kr/admin:v1';
const PIN_GATE_HASH = 'd312d02a830d8175b549f9f3f13930a8e0b7850651c158c2ff5615ce44aa01f3';
const PIN_GATE_LEN = 6;

const pgEl    = document.getElementById('pin-gate');
const pgDots  = document.getElementById('pg-dots');
const pgKeypad = document.getElementById('pg-keypad');
const pgError = document.getElementById('pg-error');
let pgValue = '';

function renderPgDots() {
  pgDots.innerHTML = Array.from({ length: PIN_GATE_LEN }, (_, i) =>
    `<span class="pg-dot${i < pgValue.length ? ' filled' : ''}"></span>`
  ).join('');
}

function buildPgKeypad() {
  const digits = [1, 2, 3, 4, 5, 6, 7, 8, 9, 0];
  for (let i = digits.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [digits[i], digits[j]] = [digits[j], digits[i]];
  }
  const rows = [digits.slice(0, 3), digits.slice(3, 6), digits.slice(6, 9), [null, digits[9], 'delete']];
  pgKeypad.innerHTML = '';
  rows.forEach(row => {
    row.forEach(item => {
      const btn = document.createElement('button');
      btn.type = 'button';
      if (item === null) {
        btn.className = 'pg-key pg-empty';
        btn.setAttribute('aria-hidden', 'true');
      } else if (item === 'delete') {
        btn.className = 'pg-key pg-delete';
        btn.setAttribute('aria-label', '지우기');
        btn.innerHTML = '<svg width="22" height="17" viewBox="0 0 26 18" fill="none" aria-hidden="true"><path d="M10 1H23a2 2 0 012 2v12a2 2 0 01-2 2H10L2 9l8-8z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><line x1="15" y1="7" x2="20" y2="12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="20" y1="7" x2="15" y2="12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>';
        btn.addEventListener('click', () => {
          pgValue = pgValue.slice(0, -1);
          pgError.textContent = '';
          renderPgDots();
        });
      } else {
        btn.className = 'pg-key';
        btn.textContent = item;
        btn.setAttribute('data-pg-digit', item);
        btn.addEventListener('click', () => handlePgDigit(String(item)));
      }
      pgKeypad.appendChild(btn);
    });
  });
}

async function handlePgDigit(digit) {
  if (pgValue.length >= PIN_GATE_LEN) return;
  pgValue += digit;
  renderPgDots();
  pgError.textContent = '';
  if (pgValue.length === PIN_GATE_LEN) {
    await validatePgPin();
  }
}

async function validatePgPin() {
  try {
    const bytes = new TextEncoder().encode(PIN_GATE_SALT + ':' + pgValue);
    const buf   = await crypto.subtle.digest('SHA-256', bytes);
    const hash  = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    if (hash === PIN_GATE_HASH) {
      pgEl.hidden = true;
      memo.focus({ preventScroll: true });
    } else {
      pgError.textContent = 'PIN이 올바르지 않습니다.';
      pgDots.style.animation = 'pgShake .35s ease';
      setTimeout(() => {
        pgDots.style.animation = '';
        pgValue = '';
        renderPgDots();
        buildPgKeypad();
      }, 380);
    }
  } catch {
    pgError.textContent = 'HTTPS 접속 여부를 확인해 주세요.';
    pgValue = '';
    renderPgDots();
  }
}

function showPinGate() {
  pgEl.hidden = false;
  pgValue = '';
  buildPgKeypad();
  renderPgDots();
}

});

retrySetsBtn.addEventListener('click', async () => {
  if (!memo.value.trim()) {
    status.textContent = '본문을 먼저 입력해 주세요.';
    memo.focus();
    return;
  }
  state.variantSeed += 1;
  status.textContent = '새 조합으로 다시 조정 중입니다.';
  retrySetsBtn.disabled = true;
  generateBtn.disabled = true;
  try {
    const result = await requestTags();
    renderResult(result);
    status.textContent = '새 세트를 준비했어요.';
  } catch (err) {
    status.textContent = err?.message || '새 세트 생성에 실패했어요.';
  } finally {
    retrySetsBtn.disabled = false;
    generateBtn.disabled = false;
  }
});

copyBtn.addEventListener('click', async () => {
  const text = selectedSet()?.copyText || '';
  if (!text) return;
  try {
    await navigator.clipboard.writeText(text);
    status.textContent = '복사했어요. 인스타그램 본문 아래에 붙여넣어 주세요.';
  } catch {
    status.textContent = '복사가 막혀 있어요. 태그 영역을 길게 눌러 복사해 주세요.';
  }
});

loadCafeContext();
</script>
</body>
</html>
