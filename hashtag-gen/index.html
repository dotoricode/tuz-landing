<style>
  :root {
    --hash-bg: #f7f2ed;
    --hash-card: #fffdf9;
    --hash-cream: #fbf1e3;
    --hash-mint: #e7f1e9;
    --hash-coral: #f7ded6;
    --hash-lime: #eff4ca;
    --hash-red: #a52a1a;
    --hash-red-deep: #7a1d10;
    --hash-red-soft: rgba(165, 42, 26, 0.12);
    --hash-red-line: rgba(165, 42, 26, 0.22);
    --hash-ink: #171412;
    --hash-muted: #8c8178;
    --hash-soft-line: rgba(26, 22, 18, 0.12);
  }

  * { -webkit-tap-highlight-color: transparent; }

  body {
    min-height: 100dvh;
    display: block;
    background: var(--hash-bg);
    overscroll-behavior-y: auto;
  }

  .hash-shell {
    min-height: 100dvh;
    display: grid;
    place-items: center;
    padding: 0;
    background: var(--hash-bg);
  }

  .splash {
    position: fixed;
    inset: 0;
    z-index: 20;
    display: grid;
    place-items: center;
    overflow: hidden;
    background: #dfe7e8;
    color: #fff;
    transition: opacity 520ms ease, visibility 520ms ease;
  }

  .splash[hidden] { display: none; }

  .splash::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 50% 31%, rgba(165, 42, 26, 0.22), transparent 12%),
      linear-gradient(180deg, rgba(20, 28, 31, 0.04), rgba(74, 24, 16, 0.32)),
      url("assets/splash-press.png") center / cover no-repeat;
    transform: scale(1.01);
    transition: opacity 420ms ease, transform 900ms cubic-bezier(0.16, 1, 0.3, 1);
  }

  .splash.is-loading::before {
    background:
      radial-gradient(circle at 50% 31%, rgba(165, 42, 26, 0.24), transparent 13%),
      linear-gradient(180deg, rgba(20, 28, 31, 0.02), rgba(74, 24, 16, 0.26)),
      url("assets/splash-progress.png") center 24% / cover no-repeat;
    transform: scale(1.035);
  }

  .splash.is-done {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .splash__content {
    position: relative;
    z-index: 1;
    width: min(100%, 430px);
    min-height: 100dvh;
    display: grid;
    align-content: center;
    justify-items: center;
    padding: 42px 30px 64px;
    text-align: center;
  }

  .press-target {
    position: relative;
    width: 96px;
    height: 170px;
    border: 0;
    background: transparent;
    cursor: pointer;
    touch-action: manipulation;
  }

  .press-target::before {
    content: "";
    position: absolute;
    top: 0;
    left: 50%;
    width: 74px;
    height: 74px;
    border-radius: 50%;
    background: rgba(165, 42, 26, 0.18);
    box-shadow: 0 0 0 10px rgba(255, 255, 255, 0.14);
    transform: translateX(-50%);
    transition: transform 280ms ease, background 280ms ease;
  }

  .press-target::after {
    content: "";
    position: absolute;
    top: 16px;
    left: 50%;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: #fff9f3;
    transform: translateX(-50%);
    box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
    transition: transform 280ms ease;
  }

  .press-target span {
    position: absolute;
    top: 72px;
    left: 50%;
    width: 1px;
    height: 92px;
    background: linear-gradient(180deg, rgba(255, 249, 243, 0.86), rgba(165, 42, 26, 0.22));
    transform: translateX(-50%);
    overflow: hidden;
    text-indent: -999px;
  }

  .press-target:active::before,
  .press-target.is-pressed::before {
    background: rgba(165, 42, 26, 0.28);
    transform: translateX(-50%) scale(1.16);
  }

  .press-target:active::after,
  .press-target.is-pressed::after {
    transform: translateX(-50%) scale(0.84);
  }

  .progress-ring {
    position: absolute;
    top: calc(50% - 148px);
    left: 50%;
    z-index: 2;
    width: 196px;
    height: 196px;
    border-radius: 50%;
    border: 7px solid rgba(255, 249, 243, 0.44);
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.88);
    transition: opacity 240ms ease, transform 420ms ease;
    pointer-events: none;
  }

  .progress-ring::before {
    content: "";
    position: absolute;
    inset: -7px;
    border-radius: 50%;
    border: 7px solid transparent;
    border-right-color: rgba(255, 249, 243, 0.96);
    border-bottom-color: rgba(165, 42, 26, 0.78);
    animation: ringSpin 1s ease-in-out infinite;
  }

  .splash.is-loading .progress-ring {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }

  .splash__hint {
    position: absolute;
    bottom: calc(env(safe-area-inset-bottom) + 24px);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 34px;
    padding: 8px 16px;
    border: 1px solid rgba(255, 249, 243, 0.34);
    border-radius: 999px;
    background: rgba(122, 29, 16, 0.2);
    color: rgba(255, 249, 243, 0.9);
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  @keyframes ringSpin {
    to { transform: rotate(360deg); }
  }

  .phone {
    position: relative;
    width: min(100vw, 430px);
    min-height: 100dvh;
    background: var(--hash-card);
    color: var(--hash-ink);
    overflow: hidden;
  }

  @media (min-width: 520px) {
    .hash-shell {
      padding: 24px;
    }

    .phone {
      width: 390px;
      min-height: 820px;
      max-height: 900px;
      border: 12px solid #171412;
      border-radius: 46px;
      box-shadow: 0 34px 70px rgba(0, 0, 0, 0.2);
    }
  }

  .phone__island {
    position: absolute;
    top: 14px;
    left: 50%;
    width: 122px;
    height: 36px;
    border-radius: 999px;
    background: #050505;
    transform: translateX(-50%);
    z-index: 3;
  }

  .phone__status {
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 25px 0;
    font-size: 15px;
    font-weight: 700;
  }

  .status-icons {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    color: var(--hash-ink);
  }

  .battery {
    width: 24px;
    height: 12px;
    border: 1.8px solid currentColor;
    border-radius: 4px;
    position: relative;
  }

  .battery::before {
    content: "";
    position: absolute;
    right: -4px;
    top: 3px;
    width: 2px;
    height: 5px;
    border-radius: 0 2px 2px 0;
    background: currentColor;
  }

  .battery::after {
    content: "";
    position: absolute;
    inset: 2px 3px;
    border-radius: 2px;
    background: currentColor;
  }

  .phone__top {
    display: grid;
    grid-template-columns: 34px 1fr 34px;
    align-items: center;
    gap: 8px;
    padding: 14px 22px 0;
  }

  .icon-button {
    width: 34px;
    height: 34px;
    display: inline-grid;
    place-items: center;
    border: 0;
    border-radius: 999px;
    color: var(--hash-ink);
    background: transparent;
    text-decoration: none;
    cursor: pointer;
  }

  .app-pill {
    justify-self: center;
    min-width: 52px;
    height: 34px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    border: 1px solid rgba(165, 42, 26, 0.16);
    border-radius: 13px;
    color: var(--hash-red-deep);
    background: var(--hash-mint);
    font-size: 14px;
    box-shadow: 0 2px 8px rgba(122, 29, 16, 0.06);
  }

  .composer-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 24px 12px;
    border-bottom: 1px solid rgba(165, 42, 26, 0.1);
  }

  .composer-head strong {
    font-size: 17px;
    font-weight: 750;
  }

  .composer-meta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    color: var(--hash-muted);
    font-size: 15px;
    font-weight: 650;
  }

  .composer-main {
    display: grid;
    grid-template-rows: auto auto 1fr auto;
    gap: 16px;
    min-height: calc(100dvh - 170px);
    padding: 18px 24px calc(env(safe-area-inset-bottom) + 22px);
  }

  @media (min-width: 520px) {
    .composer-main {
      min-height: 650px;
      padding-bottom: 28px;
    }

  .body-card {
    border: 1px solid rgba(165, 42, 26, 0.18);
    border-radius: 16px;
    background: var(--hash-cream);
    overflow: hidden;
  }

  .post-body {
    width: 100%;
    min-height: 255px;
    display: block;
    border: 0;
    resize: vertical;
    padding: 18px;
    color: var(--hash-ink);
    background:

      radial-gradient(circle at 64% 58%, rgba(31, 122, 50, 0.08), transparent 26%),

    font-family: var(--font-sans);
    font-size: 16px;
    line-height: 1.6;
    letter-spacing: 0;
  }

  .post-body:focus {
    outline: none;
    box-shadow: inset 0 0 0 2px rgba(165, 42, 26, 0.22);
  }

  .post-body::placeholder {
    color: #9e9389;
  }

  .composer-tools {
    display: flex;
    align-items: center;
    gap: 13px;
    padding: 12px 14px;
    color: #9c948b;
    border-top: 1px solid rgba(165, 42, 26, 0.1);
  }

  .tool-dot {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--hash-mint);
    box-shadow: inset 0 0 0 1px rgba(165, 42, 26, 0.08);
  }

  .tool-sep {
    width: 1px;
    height: 16px;
    background: rgba(165, 42, 26, 0.14);
  }

  .caption-copy {
    text-align: center;
    padding: 2px 4px 4px;
  }

  .caption-copy h1 {
    margin: 0 0 8px;
    font-size: 23px;
    line-height: 1.18;
    letter-spacing: 0;
    font-weight: 800;
  }

  .caption-copy p {
    margin: 0;
    color: #30251f;
    font-size: 17px;
    line-height: 1.42;
    font-weight: 650;
  }

  .caption-copy .muted {
    display: block;
    margin-top: 7px;
    color: var(--hash-muted);
    font-weight: 650;
  }

  .result-panel {
    display: grid;
    gap: 10px;
    padding: 14px;
    border: 1px solid rgba(165, 42, 26, 0.18);
    border-radius: 17px;
    background:
      radial-gradient(circle at 92% 0%, rgba(239, 244, 202, 0.76), transparent 36%),
      var(--hash-coral);
  }

  .result-panel[hidden] { display: none; }

  .result-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  .result-head strong {
    font-size: 15px;
  }

  .result-head span {
    color: #7d554c;
    font-size: 12px;
  }

  .copy-text {
    color: var(--hash-ink);
    font-size: 13px;
    line-height: 1.55;
    overflow-wrap: anywhere;
  }

  .tag-groups {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
  }

  .tag-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 7px 9px;
    border-radius: 999px;
    background: rgba(255, 253, 249, 0.92);
    border: 1px solid rgba(165, 42, 26, 0.16);
    color: #3d2d27;
    font-size: 12px;
  }

  .tag-chip button {
    width: 17px;
    height: 17px;
    border: 0;
    border-radius: 50%;
    background: rgba(165, 42, 26, 0.1);
    color: var(--hash-red);
    line-height: 17px;
    padding: 0;
    cursor: pointer;
  }

  .bottom-bar {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 12px;
    margin-top: auto;
  }

  .time-left,
  .info-button {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--hash-ink);
    font-size: 14px;
    font-weight: 750;
  }

  .info-button {
    justify-self: end;
    width: 28px;
    height: 28px;
    justify-content: center;
    border: 0;
    border-radius: 50%;
    background: transparent;
    cursor: pointer;
  }

  .answer-button {
    min-width: 118px;
    height: 46px;
    border: 1px solid var(--hash-red);
    border-radius: 999px;
    background: var(--hash-red);
    color: #fffdf9;
    font-family: var(--font-sans);
    font-size: 16px;
    font-weight: 750;
    cursor: pointer;
    box-shadow: 0 12px 24px rgba(122, 29, 16, 0.22);
    transition: transform 150ms ease, box-shadow 150ms ease, background 150ms ease;
  }

  .answer-button:active {
    transform: scale(0.96);
    background: var(--hash-red-deep);
    box-shadow: 0 5px 12px rgba(122, 29, 16, 0.24);
  }

  .status {
    min-height: 18px;
    color: var(--hash-red-deep);
    font-size: 12px;
    text-align: center;
  }

  .home-indicator {
    width: 128px;
    height: 5px;
    margin: 6px auto 0;
    border-radius: 999px;
    background: var(--hash-ink);
  }
</style>

function normalizeTag(value) {
  const cleaned = String(value || '')
    .trim()
    .replace(/[,\s]+/g, '')
    .replace(/^#+/, '')
    .replace(/[^0-9A-Za-z_가-힣]/g, '');
  if (!cleaned) return '';
  return `#${cleaned}`;
}

function uniqTags(tags) {
  const seen = new Set();
  return tags.map(normalizeTag).filter(tag => {
    const key = tag.toLowerCase();
    if (!tag || /^#test\d*$/i.test(tag) || seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

function limitGroups(groups, maxTags = 24) {
  let remaining = maxTags;
  return groups.map(group => {
    const tags = group.tags.slice(0, remaining);
    remaining -= tags.length;
    return { ...group, tags };
  }).filter(group => group.tags.length);
}

function dedupeGroups(groups) {
  const seen = new Set();
  return groups.map(group => {
    const tags = group.tags.filter(tag => {
      const key = tag.toLowerCase();
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });
    return { ...group, tags };
  }).filter(group => group.tags.length);
}

function keywordTags(text) {
  const source = String(text || '').toLowerCase();
  const pairs = [
    ['크림', '#크림라떼'],
    ['라떼', '#라떼'],
    ['아메리카노', '#아메리카노'],
    ['커피', '#커피맛집'],
    ['디저트', '#디저트맛집'],
    ['쿠폰', '#쿠폰이벤트'],
    ['이벤트', '#이벤트중'],
    ['조용', '#조용한카페'],
    ['오후', '#오후카페'],
    ['신메뉴', '#신메뉴출시'],
    ['말차', '#말차라떼'],
    ['초코', '#초코디저트'],
    ['딸기', '#딸기디저트'],
    ['말차', '#말차맛집'],
    ['케이크', '#케이크맛집'],
    ['성남동', '#성남동카페'],
    ['울산', '#울산카페']
  ];
  return pairs.filter(([keyword]) => source.includes(keyword)).map(([, tag]) => tag);
}

function formatCopyText(groups) {
  return groups.flatMap(group => group.tags).join(' ');
}

function buildFallbackTags({ memoText, context }) {
  const memoTags = keywordTags(memoText);
  const menuTags = Array.isArray(context.menuTags) ? context.menuTags.slice(0, 5) : [];
  const groups = [
    { key: 'recommended', label: '추천', tags: uniqTags([...memoTags, ...FALLBACK_CONTEXT.baseTags]).slice(0, 12) },
    { key: 'menu', label: '메뉴', tags: uniqTags(menuTags).slice(0, 5) },
    { key: 'local', label: '지역', tags: uniqTags(context.localTags || FALLBACK_CONTEXT.localTags).slice(0, 5) },
    { key: 'brand', label: 'TUZ', tags: uniqTags(context.brandTags || FALLBACK_CONTEXT.brandTags).slice(0, 5) }
  ];
  return limitGroups(dedupeGroups(groups.filter(group => group.tags.length)));
}

async function loadCafeContext() {
  try {
    const headers = {
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
      Accept: 'application/json'
    };
    const [menuResponse, pickResponse] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/menu?select=name,category&order=sort_order.asc&limit=20`, { headers }),
      fetch(`${SUPABASE_URL}/rest/v1/pick?select=name,menu:menu_id(name)&order=sort_order.asc&limit=4`, { headers })
    ]);
    if (!menuResponse.ok || !pickResponse.ok) throw new Error('context fetch failed');
    const [menu, picks] = await Promise.all([menuResponse.json(), pickResponse.json()]);
    const menuNames = (menu || []).map(item => item.name).filter(Boolean);
    const pickNames = (picks || []).map(item => item.menu?.name || item.name).filter(Boolean);
    const menuTags = uniqTags([...pickNames, ...menuNames].slice(0, 10).map(name => `#${name}`));
    state.context = { ...FALLBACK_CONTEXT, menuTags };
  } catch (err) {
    console.info('[hashtag-gen] cafe context fallback:', err?.message || err);
  }
}

function renderGroups(groups) {
  state.groups = limitGroups(dedupeGroups(groups.map(group => ({ ...group, tags: uniqTags(group.tags) })).filter(group => group.tags.length)));
  const total = state.groups.flatMap(group => group.tags).length;
  copyText.textContent = formatCopyText(state.groups);
  tagGroups.innerHTML = state.groups.flatMap(group => group.tags).map(tag => `
    <span class="tag-chip">${tag}<button type="button" aria-label="${tag} 제거" data-remove-tag="${tag}">×</button></span>
  `).join('');
  summary.textContent = `${total}개`;
  tagCountMeta.textContent = String(total);
  resultState.hidden = false;
}

async function requestTags() {
  const memoText = memo.value.trim();
  const payload = {
    postType: state.postType,
    memo: memoText,
    includeLocalTags: true,
    includeBrandTags: true
  };

  try {
    const response = await fetch('/api/hashtag-gen', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!response.ok) throw new Error(`API ${response.status}`);
    const data = await response.json();
    if (!Array.isArray(data.tags) || !data.tags.length) throw new Error('empty result');
    return data.tags;
  } catch (err) {
    console.info('[hashtag-gen] api fallback:', err?.message || err);
    return buildFallbackTags({ memoText, context: state.context });
  }
}

function startSplash() {
  if (splash.classList.contains('is-loading')) return;
  startButton.classList.add('is-pressed');
  splash.classList.add('is-loading');
  window.setTimeout(() => {
    splash.classList.add('is-done');
    memo.focus({ preventScroll: true });
  }, 900);
  window.setTimeout(() => {
    splash.hidden = true;
  }, 1450);
}

startButton.addEventListener('click', startSplash);

memo.addEventListener('input', () => {
  memoCount.textContent = `${memo.value.length}자`;
});

generateBtn.addEventListener('click', async () => {
  const body = memo.value.trim();
  if (!body) {
    status.textContent = '인스타그램 게시글 본문을 먼저 입력해 주세요.';
    memo.focus();
    return;
  }
  status.textContent = '본문과 어울리는 태그를 고르는 중입니다.';
  generateBtn.disabled = true;
  try {
    const groups = await requestTags();
    renderGroups(groups);
    status.textContent = '복사해서 인스타그램에 붙여넣어 주세요.';
  } catch {
    status.textContent = '잠시 연결이 불안정해요. 본문은 그대로 두었으니 다시 눌러주세요.';
  } finally {
    generateBtn.disabled = false;
  }
});

resetBtn.addEventListener('click', () => {
  state.groups = [];
  memo.value = '';
  memoCount.textContent = '0자';
  tagCountMeta.textContent = '0';
  status.textContent = '';
  tagGroups.innerHTML = '';
  copyText.textContent = '';
  resultState.hidden = true;
  memo.focus();
});

tagGroups.addEventListener('click', (event) => {
  const remove = event.target.closest('[data-remove-tag]');
  if (!remove) return;
  const tag = remove.dataset.removeTag;
  const nextGroups = state.groups.map(group => ({
    ...group,
    tags: group.tags.filter(item => item !== tag)
  })).filter(group => group.tags.length);
  renderGroups(nextGroups);
});

copyBtn.addEventListener('click', async () => {
  const text = formatCopyText(state.groups);
  if (!text) return;
  try {
    await navigator.clipboard.writeText(text);
    status.textContent = '복사했어요. 인스타그램 본문 아래에 붙여넣어 주세요.';
  } catch {
    status.textContent = '복사가 막혀 있어요. 태그 영역을 길게 눌러 복사해 주세요.';
  }
});

loadCafeContext();
</script>
