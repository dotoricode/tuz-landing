<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
<meta name="theme-color" content="#f7f5f2"/>
<meta name="robots" content="noindex,nofollow"/>
<title>TUZ · 해시태그 만들기</title>
<meta name="description" content="TUZ 인스타그램 게시글 본문 기반 해시태그 생성기"/>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23a52a1a'/%3E%3Ctext x='50%25' y='56%25' text-anchor='middle' font-family='Georgia,serif' font-size='28' font-weight='600' fill='%23f4ecda'%3ETUZ%3C/text%3E%3C/svg%3E"/>
<link rel="stylesheet" href="../styles.css?v=55"/>
<style>
  :root {
    --hash-bg: #f6f5f3;
    --hash-card: #ffffff;
    --hash-cream: #fbfaf8;
    --hash-mint: #eef3ef;
    --hash-coral: #f8f4f1;
    --hash-lime: #f3f2ea;
    --hash-red: #a52a1a;
    --hash-red-deep: #7a1d10;
    --hash-red-soft: rgba(165, 42, 26, 0.07);
    --hash-red-line: rgba(165, 42, 26, 0.16);
    --hash-ink: #171412;
    --hash-muted: #8c8178;
    --hash-soft-line: rgba(26, 22, 18, 0.12);
  }

  * { -webkit-tap-highlight-color: transparent; }

  body {
    min-height: 100dvh;
    display: block;
    background: var(--hash-bg);
    overscroll-behavior-y: auto;
  }

  .hash-shell {
    min-height: 100dvh;
    display: grid;
    place-items: center;
    padding: 0;
    background: var(--hash-bg);
  }

  .splash {
    position: fixed;
    inset: 0;
    z-index: 20;
    display: grid;
    place-items: center;
    overflow: hidden;
    background: #f5f4f1;
    color: #fff;
    transition: opacity 520ms ease, visibility 520ms ease;
    pointer-events: none;
    animation: splashAutoOut 0.8s 0.1s ease forwards;
  }

  .splash[hidden] { display: none; }

  .splash::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(0, 0, 0, 0.04)),
      url("/hashtag-gen/assets/splash-open.png") center / cover no-repeat;
    will-change: transform;
  }

  .splash.is-loading::before {
    transform: scale(1);
  }

  .splash__message {
    position: relative;
    z-index: 1;
    display: inline-block;
    max-width: 280px;
    color: rgba(23, 20, 18, 0.52);
    font-family: "Marker Felt", "Comic Sans MS", "Chalkboard SE", "Apple SD Gothic Neo", system-ui, sans-serif;
    font-size: 34px;
    font-weight: 600;
    line-height: 1.2;
    letter-spacing: 1.5px;
    text-align: center;
    text-shadow:
      1px 1px 0 rgba(255, 255, 255, 0.78),
      0 5px 12px rgba(31, 28, 22, 0.04);
    transform: translateY(-20px) rotate(-4deg);
  }

  .splash__message span {
    display: inline-block;
  }

  .scribble-line--top { transform: translateX(4px) rotate(-1deg); }
  .scribble-line--bottom { transform: translateX(-3px) rotate(2deg); }
  .scribble-line--bottom .scribble-word { margin-left: 8px; }
  .scribble-char:nth-child(1) { transform: translateY(2px) rotate(-7deg); }
  .scribble-char:nth-child(2) { transform: translateY(-2px) rotate(4deg); }
  .scribble-char:nth-child(3) { transform: translateY(1px) rotate(-3deg); }
  .scribble-char:nth-child(4) { transform: translateY(-1px) rotate(5deg); }
  .scribble-char:nth-child(5) { transform: translateY(2px) rotate(-4deg); }
  .scribble-char:nth-child(6) { transform: translateY(-2px) rotate(3deg); }

  .splash.is-done {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  @keyframes splashAutoOut {
    0%, 55% {
      opacity: 1;
      visibility: visible;
    }
    100% {
      opacity: 0;
      visibility: hidden;
    }
  }

  /* ── PIN GATE ─────────────────────────────────────────────── */
  #pin-gate {
    position: fixed;
    inset: 0;
    z-index: 15;
    background: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: env(safe-area-inset-top, 24px) 32px env(safe-area-inset-bottom, 32px);
    gap: 0;
  }

  #pin-gate[hidden] { display: none !important; }

  .pg-title {
    font-size: 1.08rem;
    font-weight: 700;
    color: #1a1714;
    text-align: center;
    line-height: 1.5;
    margin: 0 0 32px;
  }

  .pg-dots {
    display: flex;
    gap: 20px;
    margin: 0 0 52px;
  }

  .pg-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #d6cec3;
    transition: background-color .12s ease, transform .1s ease;
  }

  .pg-dot.filled {
    background: #3a9e5f;
    transform: scale(1.06);
  }

  .pg-keypad {
    display: grid;
    grid-template-columns: repeat(3, 72px);
    gap: 10px 16px;
  }

  .pg-key {
    height: 72px;
    border: none;
    border-radius: 999px;
    background: #f4f3f0;
    color: #1a1714;
    font-family: inherit;
    font-size: 1.65rem;
    font-weight: 400;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    transition: background-color .08s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .pg-key:active { background: #e2e0db; }

  .pg-key.pg-empty {
    background: none;
    pointer-events: none;
    cursor: default;
  }

  .pg-key.pg-delete {
    background: none;
    color: #1a1714;
    font-size: 1rem;
  }

  .pg-key.pg-delete:active { background: #f0eeeb; }

  #pg-error {
    margin-top: 26px;
    font-size: .88rem;
    color: #c0392b;
    font-weight: 600;
    min-height: 1.2em;
    text-align: center;
  }

  @keyframes pgShake {
    0%, 100% { transform: translateX(0); }
    20%       { transform: translateX(-9px); }
    40%       { transform: translateX(9px); }
    60%       { transform: translateX(-6px); }
    80%       { transform: translateX(6px); }
  }

  .phone {
    position: relative;
    width: min(100vw, 430px);
    min-height: 100dvh;
    background: var(--hash-card);
    color: var(--hash-ink);
    overflow: hidden;
  }

  @media (min-width: 520px) {
    .hash-shell {
      padding: 24px;
    }

    .splash__message {
      font-size: 38px;
      transform: translateY(-12px) rotate(-4deg);
    }

    .phone {
      width: 390px;
      min-height: 820px;
      max-height: 900px;
      border: 12px solid #171412;
      border-radius: 46px;
      box-shadow: 0 34px 70px rgba(0, 0, 0, 0.2);
    }
  }

  .phone__top {
    display: grid;
    grid-template-columns: 34px 1fr 34px;
    align-items: center;
    gap: 8px;
    padding: 22px 22px 0;
  }

  .icon-button {
    width: 34px;
    height: 34px;
    display: inline-grid;
    place-items: center;
    border: 0;
    border-radius: 999px;
    color: var(--hash-ink);
    background: transparent;
    text-decoration: none;
    cursor: pointer;
  }

  .composer-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 24px 12px;
    border-bottom: 1px solid rgba(26, 22, 18, 0.08);
  }

  .composer-head strong {
    font-size: 17px;
    font-weight: 750;
  }

  .composer-meta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    color: var(--hash-muted);
    font-size: 15px;
    font-weight: 650;
  }

  .composer-main {
    display: grid;
    grid-template-rows: auto auto 1fr auto;
    gap: 16px;
    min-height: calc(100dvh - 170px);
    padding: 18px 24px calc(env(safe-area-inset-bottom) + 22px);
  }

  @media (min-width: 520px) {
    .composer-main {
      min-height: 650px;
      padding-bottom: 28px;
    }
  }

  .body-card {
    border: 1px solid rgba(26, 22, 18, 0.12);
    border-radius: 16px;
    background: #fff;
    overflow: hidden;
  }

  .post-body {
    width: 100%;
    min-height: 255px;
    display: block;
    border: 0;
    resize: vertical;
    padding: 18px;
    color: var(--hash-ink);
    background:
      radial-gradient(circle at 36% 26%, rgba(165, 42, 26, 0.025), transparent 22%),
      radial-gradient(circle at 64% 58%, rgba(26, 22, 18, 0.025), transparent 26%),
      var(--hash-cream);
    font-family: var(--font-sans);
    font-size: 16px;
    line-height: 1.6;
    letter-spacing: 0;
  }

  .post-body:focus {
    outline: none;
    box-shadow: inset 0 0 0 2px rgba(165, 42, 26, 0.14);
  }

  .post-body::placeholder {
    color: #9e9389;
  }

  .caption-copy {
    text-align: center;
    padding: 2px 4px 4px;
  }

  .caption-copy h1 {
    margin: 0 0 8px;
    font-size: 23px;
    line-height: 1.18;
    letter-spacing: 0;
    font-weight: 800;
  }

  .caption-copy p {
    margin: 0;
    color: #30251f;
    font-size: 17px;
    line-height: 1.42;
    font-weight: 650;
  }

  .caption-copy .muted {
    display: block;
    margin-top: 7px;
    color: var(--hash-muted);
    font-weight: 650;
  }

  .result-panel {
    display: grid;
    gap: 10px;
    padding: 14px;
    border: 1px solid rgba(26, 22, 18, 0.12);
    border-radius: 17px;
    background: var(--hash-coral);
  }

  .result-panel[hidden] { display: none; }

  .result-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  .result-head strong {
    font-size: 15px;
  }

  .result-head span {
    color: var(--hash-muted);
    font-size: 12px;
  }

  .copy-text {
    color: var(--hash-ink);
    font-size: 13px;
    line-height: 1.55;
    overflow-wrap: anywhere;
  }

  .tag-groups {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
  }

  .tag-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 7px 9px;
    border-radius: 999px;
    background: #fff;
    border: 1px solid rgba(26, 22, 18, 0.1);
    color: #2f2b27;
    font-size: 12px;
  }

  .tag-chip--alt {
    border-color: rgba(165, 42, 26, 0.18);
    background: rgba(255, 255, 255, 0.82);
    cursor: pointer;
  }

  .tag-chip button {
    width: 17px;
    height: 17px;
    border: 0;
    border-radius: 50%;
    background: var(--hash-red-soft);
    color: var(--hash-red);
    line-height: 17px;
    padding: 0;
    cursor: pointer;
  }

  .result-subhead {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-top: 2px;
  }

  .result-subhead strong {
    font-size: 13px;
  }

  .result-subhead span {
    color: var(--hash-muted);
    font-size: 12px;
  }

  .extra-panel[hidden] {
    display: none;
  }

  .admin-panel {
    display: grid;
    gap: 8px;
    padding: 10px 12px;
    border: 1px solid rgba(26, 22, 18, 0.08);
    border-radius: 14px;
    background: rgba(255, 252, 248, 0.92);
  }

  .admin-panel[hidden] {
    display: none;
  }

  /* ── TUNE PANEL ─────────────────────────────────────────────── */
  .tune-panel {
    border: 1px solid var(--hash-soft-line);
    border-radius: 14px;
    padding: 14px 16px;
    background: rgba(255, 252, 248, 0.9);
    display: grid;
    gap: 10px;
  }

  .tune-panel[hidden] { display: none; }

  .tune-steps {
    display: grid;
    gap: 8px;
  }

  .tune-step {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 13px;
    line-height: 1.35;
    color: var(--hash-ink);
  }

  .tune-step-icon {
    flex: 0 0 18px;
    font-size: 13px;
    line-height: 1.35;
  }

  .tune-step.ts-pending .tune-step-icon::before { content: '⏳'; }
  .tune-step.ts-done    .tune-step-icon::before { content: '✓'; }
  .tune-step.ts-error   .tune-step-icon::before { content: '✕'; }

  .tune-step.ts-done  { color: #2a8c4a; }
  .tune-step.ts-error { color: #c0392b; }

  .tune-diff[hidden] { display: none; }

  .tune-diff {
    display: grid;
    gap: 8px;
    padding-top: 10px;
    border-top: 1px solid var(--hash-soft-line);
  }

  .tune-diff-label {
    margin: 0;
    font-size: 11px;
    font-weight: 700;
    color: var(--hash-muted);
    text-transform: uppercase;
    letter-spacing: .06em;
  }

  .tune-ba {
    display: grid;
    grid-template-columns: 1fr 18px 1fr;
    gap: 6px 2px;
    align-items: start;
  }

  .tune-ba-col {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .tune-ba-header {
    font-size: 11px;
    font-weight: 700;
    color: var(--hash-muted);
    margin-bottom: 2px;
  }

  .tune-ba-arrow {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding-top: 22px;
    color: var(--hash-muted);
    font-size: 12px;
  }

  .tune-tag {
    display: inline-block;
    font-size: 12px;
    padding: 3px 8px;
    border-radius: 999px;
    background: rgba(26, 22, 18, .07);
    color: var(--hash-ink);
    word-break: break-all;
  }

  .tune-tag.t-added   { background: rgba(42, 140, 74, .14); color: #1b6b3a; }
  .tune-tag.t-removed { background: rgba(192, 57, 43, .09); color: #a52a1a; text-decoration: line-through; }

  .admin-field {
    display: grid;
    gap: 6px;
  }

  .admin-field span {
    color: #322821;
    font-size: 12px;
    font-weight: 700;
  }

  .admin-field input {
    width: 100%;
    height: 38px;
    border: 1px solid rgba(26, 22, 18, 0.12);
    border-radius: 12px;
    padding: 0 12px;
    color: var(--hash-ink);
    background: #fff;
    font: inherit;
  }

  .admin-note {
    margin: 0;
    color: var(--hash-muted);
    font-size: 12px;
    line-height: 1.45;
  }

  .bottom-bar {
    display: grid;
    grid-template-columns: minmax(56px, 1fr) auto minmax(28px, 1fr);
    align-items: center;
    gap: 12px;
    margin-top: auto;
  }

  .time-left,
  .info-button {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--hash-ink);
    font-size: 14px;
    font-weight: 750;
  }

  .time-left {
    min-width: 56px;
    white-space: nowrap;
  }

  .info-button {
    justify-self: end;
    width: 28px;
    height: 28px;
    justify-content: center;
    border: 0;
    border-radius: 50%;
    background: transparent;
    cursor: pointer;
  }

  .answer-button {
    min-width: 118px;
    height: 46px;
    border: 1px solid var(--hash-ink);
    border-radius: 999px;
    background: var(--hash-ink);
    color: #fffdf9;
    font-family: var(--font-sans);
    font-size: 16px;
    font-weight: 750;
    cursor: pointer;
    box-shadow: 0 12px 24px rgba(26, 22, 18, 0.16);
    transition: transform 150ms ease, box-shadow 150ms ease, background 150ms ease;
  }

  .answer-button:active {
    transform: scale(0.96);
    background: var(--hash-red-deep);
    border-color: var(--hash-red-deep);
    box-shadow: 0 5px 12px rgba(122, 29, 16, 0.18);
  }

  .action-cluster {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    justify-self: center;
  }

  .tune-button {
    min-width: 76px;
    height: 40px;
    border: 1px solid rgba(26, 22, 18, 0.18);
    border-radius: 999px;
    background: rgba(255, 253, 249, 0.92);
    color: var(--hash-ink);
    font-family: var(--font-sans);
    font-size: 13px;
    font-weight: 760;
    cursor: pointer;
    transition: transform 150ms ease, border-color 150ms ease, background 150ms ease;
  }

  .tune-button:active {
    transform: scale(0.97);
    background: rgba(208, 95, 69, 0.12);
    border-color: rgba(122, 29, 16, 0.22);
  }

  .tune-button[hidden] {
    display: none;
  }

  .status {
    min-height: 18px;
    color: var(--hash-red-deep);
    font-size: 12px;
    text-align: center;
  }

  .home-indicator {
    width: 128px;
    height: 5px;
    margin: 6px auto 0;
    border-radius: 999px;
    background: var(--hash-ink);
  }
</style>
</head>
<body>
  <main class="hash-shell">
    <div id="pin-gate" hidden aria-label="PIN 입력">
      <p class="pg-title">PIN을 입력해 주세요</p>
      <div class="pg-dots" id="pg-dots" aria-live="polite" aria-label="입력된 자리수"></div>
      <div class="pg-keypad" id="pg-keypad" aria-label="PIN 숫자 키패드"></div>
      <p id="pg-error" role="status" aria-live="polite"></p>
    </div>

    <section class="splash" id="splash" aria-label="해시태그 생성기 시작">
      <p class="splash__message" aria-hidden="true">
        <span class="scribble-line scribble-line--top">
          <span class="scribble-char">w</span><span class="scribble-char">h</span><span class="scribble-char">a</span><span class="scribble-char">t</span><span class="scribble-char">'</span><span class="scribble-char">s</span>
        </span><br/>
        <span class="scribble-line scribble-line--bottom">
          <span class="scribble-word">
            <span class="scribble-char">g</span><span class="scribble-char">o</span><span class="scribble-char">i</span><span class="scribble-char">n</span><span class="scribble-char">g</span>
          </span>
          <span class="scribble-word">
            <span class="scribble-char">o</span><span class="scribble-char">n</span><span class="scribble-char">?</span>
          </span>
        </span>
      </p>
    </section>

    <section class="phone" aria-label="TUZ 해시태그 생성기">
      <div class="phone__top">
        <a class="icon-button" href="../" aria-label="홈으로">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
        </a>
        <span aria-hidden="true"></span>
        <span></span>
      </div>

      <header class="composer-head">
        <strong>from Tuz</strong>
        <span class="composer-meta">@ tuzz2026</span>
      </header>

      <section class="composer-main">
        <div class="body-card">
          <textarea class="post-body" id="memo" maxlength="500" aria-label="인스타그램 게시글 본문" placeholder="인스타그램에 올릴 본문을 여기에 작성해 주세요.&#10;&#10;예: 오늘은 크림라떼가 잘 나왔어요. 조용한 오후에 들르기 좋아요."></textarea>
        </div>

        <div class="caption-copy">
          <h1>Hashtag helper</h1>
          <p>게시글 본문을 기준으로<br/>관련 해시태그를 골라드려요</p>
          <span class="muted">사진 업로드는 다음 단계에서 추가</span>
        </div>

        <section class="result-panel" id="resultState" hidden>
          <div class="result-head">
            <div>
              <strong>복사할 태그</strong>
              <span id="summary">인스타그램에 붙여넣을 태그를 골랐어요.</span>
            </div>
            <button class="icon-button" id="copyBtn" type="button" aria-label="전체 복사">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="8" y="8" width="12" height="12" rx="2"/><path d="M16 8V6a2 2 0 00-2-2H6a2 2 0 00-2 2v8a2 2 0 002 2h2"/></svg>
            </button>
          </div>
          <div class="copy-text" id="copyText"></div>
          <div class="tag-groups" id="tagGroups"></div>
          <div class="extra-panel" id="extraState" hidden>
            <div class="result-subhead">
              <strong>바꿔볼 후보</strong>
              <span id="extraSummary">눌러서 바로 교체돼요.</span>
            </div>
            <div class="tag-groups" id="extraTagGroups"></div>
          </div>
        </section>

        <section class="tune-panel" id="tunePanel" hidden aria-live="polite">
          <div class="tune-steps" id="tuneSteps"></div>
          <div class="tune-diff" id="tuneDiff" hidden>
            <p class="tune-diff-label">태그 변경 내역</p>

function normalizeTag(value) {
  const cleaned = String(value || '')
    .trim()
    .replace(/[,\s]+/g, '')
    .replace(/^#+/, '')
    .replace(/[^0-9A-Za-z_가-힣]/g, '');
  if (!cleaned) return '';
  return `#${cleaned}`;
}

function uniqTags(tags) {
  const seen = new Set();
  return (Array.isArray(tags) ? tags : []).map(normalizeTag).filter(tag => {
    const key = tag.toLowerCase();
    if (!tag || /^#test\d*$/i.test(tag) || seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

function compactText(value) {
  return String(value || '').toLowerCase().replace(/\s+/g, '');
}

function sameTagList(left, right) {
  return uniqTags(left).join('|').toLowerCase() === uniqTags(right).join('|').toLowerCase();
}

function replaceLegacyTagList(tags, legacy, nextTags) {
  return sameTagList(tags, legacy) ? [...nextTags] : uniqTags(tags);
}

function limitGroups(groups, maxTags = 24) {
  let remaining = maxTags;
  return groups.map(group => {
    const tags = group.tags.slice(0, remaining);
    remaining -= tags.length;
    return { ...group, tags };
  }).filter(group => group.tags.length);
}

function dedupeGroups(groups) {
  const seen = new Set();
  return groups.map(group => {
    const tags = group.tags.filter(tag => {
      const key = tag.toLowerCase();
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });
    return { ...group, tags };
  }).filter(group => group.tags.length);
}

function keywordTags(text) {
  const source = String(text || '').toLowerCase();
  const pairs = [
    ['크림', '#크림라떼'],
    ['라떼', '#라떼'],
    ['아메리카노', '#아메리카노'],
    ['커피', '#커피맛집'],
    ['디저트', '#디저트맛집'],
    ['쿠폰', '#쿠폰이벤트'],
    ['이벤트', '#이벤트중'],
    ['조용', '#조용한카페'],
    ['오후', '#오후카페'],
    ['신메뉴', '#신메뉴출시'],
    ['말차', '#말차라떼'],
    ['초코', '#초코디저트'],
    ['딸기', '#딸기디저트'],
    ['말차', '#말차맛집'],
    ['케이크', '#케이크맛집'],
    ['반구동', '#반구동카페'],
    ['울산', '#울산카페']
  ];
  return pairs.filter(([keyword]) => source.includes(keyword)).map(([, tag]) => tag);
}

function menuTagsFromMemo(memoText, context) {
  const memoCompact = compactText(memoText);
  const menuTags = Array.isArray(context.menuTags) ? context.menuTags : [];
  return menuTags.filter(tag => {
    const plain = compactText(String(tag).replace(/^#/, ''));
    return plain && memoCompact.includes(plain);
  });
}

function formatCopyText(groups) {
  return groups.flatMap(group => group.tags).join(' ');
}

function buildResearchTags(memoText) {
  return uniqTags([
    ...keywordTags(memoText),
    ...menuTagsFromMemo(memoText, state.context),
    ...((state.context.localTags || []).slice(0, 2)),
    ...((state.context.brandTags || []).slice(0, 2))
  ]).slice(0, 12);
}

function buildFallbackTags({ memoText, context }) {
  const memoTags = keywordTags(memoText);
  const menuTags = Array.isArray(context.menuTags) ? context.menuTags.slice(0, 5) : [];
  const groups = [
    { key: 'recommended', label: '추천', tags: uniqTags([...memoTags, ...FALLBACK_CONTEXT.baseTags]).slice(0, 12) },
    { key: 'menu', label: '메뉴', tags: uniqTags(menuTags).slice(0, 5) },
    { key: 'local', label: '지역', tags: uniqTags(context.localTags || FALLBACK_CONTEXT.localTags).slice(0, 5) },
    { key: 'brand', label: 'TUZ', tags: uniqTags(context.brandTags || FALLBACK_CONTEXT.brandTags).slice(0, 5) }
  ];
  return limitGroups(dedupeGroups(groups.filter(group => group.tags.length)));
}

async function loadCafeContext() {
  try {
    const headers = {
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
      Accept: 'application/json'
    };
    const [menuResponse, pickResponse, settingsResponse] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/menu?select=name,category&order=sort_order.asc&limit=20`, { headers }),
      fetch(`${SUPABASE_URL}/rest/v1/pick?select=name,menu:menu_id(name)&order=sort_order.asc&limit=4`, { headers }),
      fetch(`${SUPABASE_URL}/rest/v1/hashtag_settings?select=required_brand_tags,required_local_tags&id=eq.1&limit=1`, { headers })
    ]);
    if (!menuResponse.ok || !pickResponse.ok || !settingsResponse.ok) throw new Error('context fetch failed');
    const [menu, picks, settingsRows] = await Promise.all([menuResponse.json(), pickResponse.json(), settingsResponse.json()]);
    const menuNames = (menu || []).map(item => item.name).filter(Boolean);
    const pickNames = (picks || []).map(item => item.menu?.name || item.name).filter(Boolean);
    const menuTags = uniqTags([...pickNames, ...menuNames].slice(0, 10).map(name => `#${name}`));
    const settings = settingsRows?.[0] || {};
    const brandTags = replaceLegacyTagList(settings.required_brand_tags || FALLBACK_CONTEXT.brandTags, ['#tuzz2026', '#투즈', '#TUZ'], FALLBACK_CONTEXT.brandTags);
    const localTags = replaceLegacyTagList(settings.required_local_tags || FALLBACK_CONTEXT.localTags, ['#울산카페', '#성남동카페', '#울산중구카페'], FALLBACK_CONTEXT.localTags);
    state.context = { ...FALLBACK_CONTEXT, menuTags, brandTags, localTags };
  } catch (err) {
    console.info('[hashtag-gen] cafe context fallback:', err?.message || err);
  }
}

function renderGroups(groups, extraGroups = [], reasonSummary = '') {
  state.groups = limitGroups(dedupeGroups(groups.map(group => ({ ...group, tags: uniqTags(group.tags) })).filter(group => group.tags.length)), 5);
  state.extraGroups = limitGroups(dedupeGroups(extraGroups.map(group => ({ ...group, tags: uniqTags(group.tags) })).filter(group => group.tags.length)), 12);
  state.resultSummary = reasonSummary || state.resultSummary;
  const total = state.groups.flatMap(group => group.tags).length;
  const extraTotal = state.extraGroups.flatMap(group => group.tags).length;
  copyText.textContent = formatCopyText(state.groups);
  tagGroups.innerHTML = state.groups.flatMap(group => group.tags).map(tag => `
    <span class="tag-chip">${tag}<button type="button" aria-label="${tag} 제거" data-remove-tag="${tag}">×</button></span>
  `).join('');
  extraTagGroups.innerHTML = state.extraGroups.flatMap(group =>
    group.tags.map(tag => `<button class="tag-chip tag-chip--alt" type="button" data-extra-tag="${tag}" data-extra-category="${group.key}" aria-label="${tag}로 교체">${tag}</button>`)
  ).join('');
  extraSummary.textContent = extraTotal ? `${extraTotal}개 후보를 눌러 교체할 수 있어요.` : '';
  extraState.hidden = !extraTotal;
  summary.textContent = state.resultSummary || `${total}개 추천`;
  resultState.hidden = false;
}

async function requestTags() {
  const memoText = memo.value.trim();
  const payload = {
    postType: state.postType,
    memo: memoText,
    includeLocalTags: true,
    includeBrandTags: true
  };

  try {
    const response = await fetch('/api/hashtag-gen', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await response.json().catch(() => ({}));
    if (!response.ok) {
      throw new Error(data.error || '해시태그 데이터 연결이 필요해요.');
    }
    if (!Array.isArray(data.tags) || !data.tags.length) throw new Error('empty result');
    return data;
  } catch (err) {
    console.info('[hashtag-gen] api error:', err?.message || err);
    throw err;
  }
}

function ensureResearchKey() {
  const key = String(state.researchKey || '').trim();
  if (!key) throw new Error('PIN 인증이 필요해요.');
  return key;
}

async function requestResearchRefresh() {
  const response = await fetch('/api/hashtag-research', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-hashtag-research-key': ensureResearchKey()
    },
    body: JSON.stringify({
      tags: buildResearchTags(memo.value.trim()),
      includeBrandTags: true,
      includeLocalTags: true,
      includeMenuTags: true
    })
  });
  const data = await response.json().catch(() => ({}));
    if (!response.ok) {
      if (response.status === 401) state.researchKey = '';
      throw new Error(data.error || '튜닝 호출에 실패했어요.');
    }
  return data;
}

// ──────────────────────────────────────────────────────────────
// PIN GATE
// ──────────────────────────────────────────────────────────────
const PIN_GATE_SALT = 'hashtag-gen.tuz.kr/admin:v1';
const PIN_GATE_HASH = 'd312d02a830d8175b549f9f3f13930a8e0b7850651c158c2ff5615ce44aa01f3';
const PIN_GATE_LEN = 6;

const pgEl    = document.getElementById('pin-gate');
const pgDots  = document.getElementById('pg-dots');
const pgKeypad = document.getElementById('pg-keypad');
const pgError = document.getElementById('pg-error');
let pgValue = '';

function renderPgDots() {
  pgDots.innerHTML = Array.from({ length: PIN_GATE_LEN }, (_, i) =>
    `<span class="pg-dot${i < pgValue.length ? ' filled' : ''}"></span>`
  ).join('');
}

function buildPgKeypad() {
  const digits = [1, 2, 3, 4, 5, 6, 7, 8, 9, 0];
  for (let i = digits.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [digits[i], digits[j]] = [digits[j], digits[i]];
  }
  const rows = [digits.slice(0, 3), digits.slice(3, 6), digits.slice(6, 9), [null, digits[9], 'delete']];
  pgKeypad.innerHTML = '';
  rows.forEach(row => {
    row.forEach(item => {
      const btn = document.createElement('button');
      btn.type = 'button';
      if (item === null) {
        btn.className = 'pg-key pg-empty';
        btn.setAttribute('aria-hidden', 'true');
      } else if (item === 'delete') {
        btn.className = 'pg-key pg-delete';
        btn.setAttribute('aria-label', '지우기');
        btn.innerHTML = '<svg width="22" height="17" viewBox="0 0 26 18" fill="none" aria-hidden="true"><path d="M10 1H23a2 2 0 012 2v12a2 2 0 01-2 2H10L2 9l8-8z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><line x1="15" y1="7" x2="20" y2="12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="20" y1="7" x2="15" y2="12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>';
        btn.addEventListener('click', () => {
          pgValue = pgValue.slice(0, -1);
          pgError.textContent = '';
          renderPgDots();
        });
      } else {
        btn.className = 'pg-key';
        btn.textContent = item;
        btn.setAttribute('data-pg-digit', item);
        btn.addEventListener('click', () => handlePgDigit(String(item)));
      }
      pgKeypad.appendChild(btn);
    });
  });
}

async function handlePgDigit(digit) {
  if (pgValue.length >= PIN_GATE_LEN) return;
  pgValue += digit;
  renderPgDots();
  pgError.textContent = '';
  if (pgValue.length === PIN_GATE_LEN) {
    await validatePgPin();
  }
}

async function validatePgPin() {
  try {
    const bytes = new TextEncoder().encode(PIN_GATE_SALT + ':' + pgValue);
    const buf   = await crypto.subtle.digest('SHA-256', bytes);
    const hash  = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    if (hash === PIN_GATE_HASH) {
      state.researchKey = pgValue;
      if (tuneBtn) tuneBtn.hidden = false;
      pgEl.hidden = true;
      memo.focus({ preventScroll: true });
    } else {
      pgError.textContent = 'PIN이 올바르지 않습니다.';
      pgDots.style.animation = 'pgShake .35s ease';
      setTimeout(() => {
        pgDots.style.animation = '';
        pgValue = '';
        renderPgDots();
        buildPgKeypad();
      }, 380);
    }
  } catch {
    pgError.textContent = 'HTTPS 접속 여부를 확인해 주세요.';
    pgValue = '';
    renderPgDots();
  }
}

function showPinGate() {
  pgEl.hidden = false;
  pgValue = '';
  buildPgKeypad();
  renderPgDots();
}

// ──────────────────────────────────────────────────────────────
function startSplash() {
  if (splash.classList.contains('is-loading')) return;
  splash.classList.add('is-loading');

    splash.hidden = true;
    showPinGate();
  }, 920);
}

window.setTimeout(startSplash, 120);

memo.addEventListener('input', () => {
  memoCount.textContent = `${memo.value.length}자`;
});

generateBtn.addEventListener('click', async () => {
  const body = memo.value.trim();
  if (!body) {
    status.textContent = '인스타그램 게시글 본문을 먼저 입력해 주세요.';
    memo.focus();
    return;
  }
  status.textContent = '본문과 어울리는 태그를 고르는 중입니다.';
  generateBtn.disabled = true;
  try {
    const result = await requestTags();
    renderGroups(result.tags, result.extraTags || [], result.reasonSummary);
    status.textContent = '복사해서 인스타그램에 붙여넣어 주세요.';
  } catch (err) {
    status.textContent = err?.message || '해시태그 데이터 연결이 필요해요. 잠시 후 다시 눌러주세요.';
  } finally {
    generateBtn.disabled = false;
  }
});

const tunePanelEl = document.getElementById('tunePanel');
const tuneStepsEl = document.getElementById('tuneSteps');
const tuneDiffEl  = document.getElementById('tuneDiff');
const tuneBaWrap  = document.getElementById('tuneBaWrap');

function setTuneStep(id, state, text) {
  let el = tuneStepsEl.querySelector(`[data-step="${id}"]`);
  if (!el) {
    el = document.createElement('div');
    el.className = 'tune-step';
    el.dataset.step = id;
    el.innerHTML = '<span class="tune-step-icon" aria-hidden="true"></span><span></span>';
    tuneStepsEl.appendChild(el);
  }
  el.className = `tune-step ts-${state}`;
  el.querySelector('span:last-child').textContent = text;
}

function renderTuneDiff(beforeTags, afterTags) {
  const bSet = new Set(beforeTags);
  const aSet = new Set(afterTags);
  const hasChange = afterTags.some(t => !bSet.has(t)) || beforeTags.some(t => !aSet.has(t));
  if (!hasChange) { tuneDiffEl.hidden = true; return; }

  const beforeItems = beforeTags.map(t => ({ tag: t, cls: aSet.has(t) ? '' : 't-removed' }));
  const afterItems  = afterTags.map(t  => ({ tag: t, cls: bSet.has(t) ? '' : 't-added'   }));

  const mkCol = (header, items) => {
    const col = document.createElement('div');
    col.className = 'tune-ba-col';
    col.innerHTML = `<span class="tune-ba-header">${header}</span>` +
      items.map(({ tag, cls }) => `<span class="tune-tag ${cls}">${tag}</span>`).join('');
    return col;
  };

  tuneBaWrap.innerHTML = '';
  tuneBaWrap.appendChild(mkCol('Before', beforeItems));
  const arrow = document.createElement('div');
  arrow.className = 'tune-ba-arrow';
  arrow.textContent = '→';
  tuneBaWrap.appendChild(arrow);
  tuneBaWrap.appendChild(mkCol('After', afterItems));
  tuneDiffEl.hidden = false;
}

if (tuneBtn) {
  tuneBtn.addEventListener('click', async () => {
    const beforeTags = state.groups.flatMap(g => g.tags);
    tunePanelEl.hidden = false;
    tuneDiffEl.hidden  = true;
    tuneStepsEl.innerHTML = '';
    status.textContent = '';
    tuneBtn.disabled = true;
    generateBtn.disabled = true;

    setTuneStep('collect', 'pending', 'Instagram 게시글 수 수집 중...');
    try {
      const refreshResult = await requestResearchRefresh();
      const count = refreshResult?.refreshedCount ?? '?';
      setTuneStep('collect', 'done', `데이터 수집 완료 — ${count}개 태그 갱신`);

      if (memo.value.trim()) {
        setTuneStep('regen', 'pending', '추천 태그 재계산 중...');
        const result = await requestTags();
        renderGroups(result.tags, result.extraTags || [], `${result.reasonSummary} 리서치 캐시도 갱신했어요.`);
        setTuneStep('regen', 'done', '추천 태그 재구성 완료');
        renderTuneDiff(beforeTags, state.groups.flatMap(g => g.tags));
        status.textContent = '튜닝 완료';
      } else {
        status.textContent = '리서치 캐시를 갱신했어요. 이제 본문을 넣고 Generate를 눌러 주세요.';
      }
    } catch (err) {
      setTuneStep('error', 'error', err?.message || '튜닝 중 오류가 발생했습니다.');
    } finally {
      tuneBtn.disabled = false;
      generateBtn.disabled = false;
    }
  });
}

resetBtn.addEventListener('click', () => {
  state.groups = [];
  state.extraGroups = [];
  state.resultSummary = '';
  memo.value = '';
  memoCount.textContent = '0자';
  status.textContent = '';
  tagGroups.innerHTML = '';
  extraTagGroups.innerHTML = '';
  copyText.textContent = '';
  extraState.hidden = true;
  resultState.hidden = true;
  if (tunePanelEl) tunePanelEl.hidden = true;
  memo.focus();
});

tagGroups.addEventListener('click', (event) => {
  const remove = event.target.closest('[data-remove-tag]');
  if (!remove) return;
  const tag = remove.dataset.removeTag;
  const nextGroups = state.groups.map(group => ({
    ...group,
    tags: group.tags.filter(item => item !== tag)
  })).filter(group => group.tags.length);
  renderGroups(nextGroups, state.extraGroups);
});

function cloneGroups(groups) {
  return groups.map(group => ({ ...group, tags: [...group.tags] }));
}

function addTagToGroup(groups, key, tag) {
  const group = groups.find(item => item.key === key);
  if (group) {
    group.tags = uniqTags([tag, ...group.tags]);
    return;
  }
  groups.push({ key, label: GROUP_LABELS[key] || key, tags: [tag] });
}

extraTagGroups.addEventListener('click', (event) => {
  const button = event.target.closest('[data-extra-tag]');
  if (!button) return;
  const incomingTag = button.dataset.extraTag;
  const incomingCategory = button.dataset.extraCategory;
  const nextGroups = cloneGroups(state.groups);
  const nextExtraGroups = cloneGroups(state.extraGroups);
  const selectedGroup = nextGroups.find(group => group.key === incomingCategory && group.tags.length);
  let outgoingTag = '';
  let outgoingCategory = '';

  if (selectedGroup) {
    outgoingCategory = selectedGroup.key;
    outgoingTag = selectedGroup.tags[selectedGroup.tags.length - 1];
    selectedGroup.tags[selectedGroup.tags.length - 1] = incomingTag;
  } else {
    const fallbackGroup = nextGroups[nextGroups.length - 1];
    if (fallbackGroup?.tags?.length) {
      outgoingCategory = fallbackGroup.key;
      outgoingTag = fallbackGroup.tags.pop();
      if (!fallbackGroup.tags.length) {
        nextGroups.splice(nextGroups.indexOf(fallbackGroup), 1);
      }
    }
    addTagToGroup(nextGroups, incomingCategory, incomingTag);
  }

  for (const group of nextExtraGroups) {
    group.tags = group.tags.filter(tag => tag !== incomingTag);
  }
  if (outgoingTag) {
    addTagToGroup(nextExtraGroups, outgoingCategory || incomingCategory, outgoingTag);
  }

  renderGroups(nextGroups, nextExtraGroups);
  status.textContent = `${incomingTag}로 바꿨어요.`;
});

copyBtn.addEventListener('click', async () => {
  const text = formatCopyText(state.groups);
  if (!text) return;
  try {
    await navigator.clipboard.writeText(text);
    status.textContent = '복사했어요. 인스타그램 본문 아래에 붙여넣어 주세요.';
  } catch {
    status.textContent = '복사가 막혀 있어요. 태그 영역을 길게 눌러 복사해 주세요.';
  }
});

loadCafeContext();
</script>
