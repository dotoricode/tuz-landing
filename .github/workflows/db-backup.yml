name: DB Backup (weekly)
# 매주 일요일 03:00 KST(=토 18:00 UTC) Supabase Postgres 덤프 → GitHub Release 첨부 (4주 회전)

on:
  schedule:
    - cron: '0 18 * * 6'   # Saturday 18:00 UTC = Sunday 03:00 KST
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # release 생성/업데이트 위해
    steps:
      - uses: actions/checkout@v4

      - name: Install pg_dump (postgresql-client-16)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      - name: Dump + gzip
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL secret 누락 (Supabase: Project Settings → Database → Connection string)"
            exit 1
          fi
          STAMP=$(date -u +"%Y%m%d-%H%M%S")
          OUT="tuz-db-$STAMP.sql.gz"
          pg_dump --no-owner --no-privileges "$DATABASE_URL" | gzip -9 > "$OUT"
          ls -lh "$OUT"
          echo "DUMP_FILE=$OUT" >> "$GITHUB_ENV"
          echo "TAG=backup-$STAMP" >> "$GITHUB_ENV"

      - name: Upload as GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: DB Backup ${{ env.TAG }}
          files: ${{ env.DUMP_FILE }}
          prerelease: true

      - name: Prune old backup releases (keep 4 latest)
        uses: actions/github-script@v7
        with:
          script: |
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner, repo: context.repo.repo, per_page: 100,
            });
            const backups = releases
              .filter(r => r.tag_name.startsWith('backup-'))
              .sort((a, b) => b.tag_name.localeCompare(a.tag_name));
            const toDelete = backups.slice(4);
            for (const r of toDelete) {
              await github.rest.repos.deleteRelease({ owner: context.repo.owner, repo: context.repo.repo, release_id: r.id });
              try {
                await github.rest.git.deleteRef({ owner: context.repo.owner, repo: context.repo.repo, ref: `tags/${r.tag_name}` });
              } catch (_) { /* tag may not exist */ }
              console.log('Deleted release', r.tag_name);
            }
